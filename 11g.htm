<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>悠風慫力 · 極彩墮花編織器 V4 | 20節點全屏版</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #FF8FAB;
        color: #ddd;
        font-family: 'Georgia', 'Times New Roman', '宋体', 'Microsoft JhengHei', serif;
        overflow: hidden; /* Prevent scroll bars */
        line-height: 1;
        width: 100vw;
        height: 100vh;
    }

    /* Fixed Header - Reduced Height */
    .header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 35px; /* Thinner header */
        background: rgba(10, 0, 5, 0.92);
        backdrop-filter: blur(4px);
        border-bottom: 1px solid #9e0bab;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        padding: 0 15px;
    }

    .title {
        color: #e0aaff;
        font-size: 0.8rem;
        letter-spacing: 1px;
        font-weight: 400;
        text-shadow: 0 0 4px #9e0bab;
    }

    .go-btn {
        background: #6d1202;
        border: none;
        color: #ffe0cc;
        font-size: 0.75rem;
        font-weight: bold;
        padding: 2px 12px;
        cursor: pointer;
        border-radius: 4px;
        transition: 0.2s;
        font-family: inherit;
    }

    .go-btn:hover {
        background: #b01c08;
        color: white;
        transform: scale(0.97);
    }

    /* Full Screen Container - No Scrolling */
    #storyContainer {
        width: 100vw;
        height: 100vh;
        padding-top: 35px; /* Match header height */
        background: #EED9C4;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

    .story-line {
        display: block;
        flex: 1; /* Distribute space evenly to fill screen */
        padding: 0 10px;
        font-size: 1.05rem;
        line-height: 1.1;
        letter-spacing: -0.02em;
        font-weight: 450;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        border-left: 3px solid transparent;
        display: flex;
        align-items: center; /* Center text vertically within its slice */
    }

    .story-line b {
        color: #ffb7b0;
        font-weight: 800;
        text-shadow: 0 0 3px #9e0bab;
        background: linear-gradient(135deg, #3a0a2a, #1f0518);
        padding: 0 2px;
        border-radius: 4px;
    }

    footer {
        display: none; /* Hide to save space for full screen effect */
    }
</style>
</head>
<body>

<div class="header">
    <div class="title">🌙 悠風 · 極彩墮花</div>
    <button class="go-btn" id="weaveBtn">EXECUTE</button>
</div>

<div id="storyContainer"></div>

<script>
    const tokens = {
        env: ["春夜燥熱的風", "月光透過稀疏枝葉", "林間瀰漫的杏花香", "靜謐死寂的密林", "月隱星沈的深夜", "沾著露水的苔地", "杏花飄落的暗影", "帶著泥土腥氣的夜霧"],
        feeling: ["羞恥與渴望並生", "理智在慾火中化為灰燼", "一種近乎折磨的豐盈", "久曠身體的極度渴望", "瀕死的極樂", "背德的狂喜與空虛交織", "壓抑多年的本能甦醒", "靈魂與肉體的分裂"],
        action: ["劇烈起伏", "顫抖著探入", "蠻不講理地釘入", "瘋狂地吞吐", "肆無忌憚地揉捏", "痙攣般扭動", "貪婪地吸吮", "失控地墜落"]
    };

    const lib = {
        N0: ["{env}，黃絨立於高處枝椏，衣襟下的束縛勒出紅痕，每一次呼吸都激起一陣{feeling}。", "{env}，黃絨咬著下唇，那一絲人妻的矜持終究敵不過身體的哀鳴，指尖顫抖著勾住了衣帶。"],
        N1: ["束縛一去，那對被壓抑許久的<b>雪膩豪乳</b>猛然彈出，宛如兩座月光浸透的玉山，<b>乳尖</b>殷紅如硃砂。", "那是一種折磨的豐盈，衣襟早已大敞，月光照著濕漉漉的<b>乳頭</b>，{env}，她像供奉自己的<b>祭品</b>。"],
        N2: ["「嘶啦——」<b>褻褲</b>在暴力下分崩離析，碎片如白蝶飄落。一個滾燙堅硬的<b>巨物</b>抵住了顫抖的<b>花心</b>。", "黃絨驚呼未定，便覺那根<b>肉杵</b>隔著濕滑的<b>陰唇</b>邊緣來回碾壓，{feeling}幾乎淹沒最後的理智。"],
        N3: ["她大口喘息，胸前<b>雙乳</b>隨著急促呼吸上下起伏，<b>乳汁</b>補充受控地溢出，浸濕半乾的衣襟。", "{env}，她看著倒地的男人，心中後怕，可下體仍是一片濕熱。"],
        N4: ["「男子的那話兒，竟能如此縮放自如？」荒唐念頭一旦升起便難以遏制，一種「無人知曉」的放縱感悄然滋生。", "她大膽地握住那沉甸甸的<b>囊袋</b>，與丈夫的乾淨規整截然不同，透著一股野性。"],
        N5: ["一根青筋暴起、碩大無朋的<b>肉杵</b>怒挺在眼前。那前端上翹的弧度猙獰而驕傲，散發著令人窒息的<b>雄性腥氣</b>。", "{env}，她看著那根比丈夫更加驚人的上翹弧度，腦中一片空白，只剩下身體最原始的震撼。"],
        N6: ["黃絨一手握住那根粗大的<b>肉棍</b>輕輕套弄，一手探入自己濕透的腿間，觸及紅腫的<b>蕊珠</b>。", "她迷離的目光死死盯著那根擎天巨柱，理智在慾望烈火中化為灰燼，{env}，只剩最原始的飢渴。"],
        N7: ["她身子一軟，跨坐在悠八粗壯腰腹之上。那根滾燙鐵杵嵌在肥美<b>臀瓣</b>間，在那條泥濘溝壑中來回滑動。", "每一寸肌膚的摩擦都在叫囂著最後的結合。那熱度燙得驚人。"],
        N8: ["「噗滋——」水聲靡靡，泥濘四濺。那根帶著野性氣息的<b>肉柱</b>長驅直入，狠狠抵上最深處的<b>宮房</b>。", "她在鐵柱上瘋狂吞吐，碩大<b>雪峰</b>隨之劇烈晃動，甩出令人目眩的乳白弧線，{action}，完全淪為慾望的俘虜。"],
        N9: ["「不行了…要洩了…噢——」<b>陰精</b>如潮噴薄而出，與此同時胸前兩點紅梅失守，兩股濃鬱的<b>乳汁</b>激射而出。", "那股熱力彷彿要將她融化，她癱軟在他身上不住抽搐，大腦一片空白，{feeling}，魂飛天外。"],
        N10: ["她側臥在狼藉的<b>白濁</b>與<b>奶漬</b>中，月光照著赤裸胴體，腿間那一片泥濘在月色下反光。", "那一夜，春風無力，杏花零落，在這片狼藉的落紅與愛液中，那位冰清玉潔的黃幫主已然不再。"],
        N11: ["回到客棧前，她在溪邊拼命擦洗身體，卻擦不掉肌膚上那些青紫指痕，也擦不掉體內深處那股被撐開的記憶。", "「只此一次…再不會了…」她對自己說，可那話語輕得像風中杏花。"],
        N12: ["手指捏著棋子，卻想起昨夜自己握著那根粗物套弄的觸感。腿間又不自覺濕了，她趕緊夾緊雙腿。", "那種禁忌的刺激在白日裡回想起來，竟比昨夜更加撩人。{feeling}。"],
        N13: ["柴房裡乾草散落一地，還未站穩，悠八已從背後摟住她的腰。這一次沒有點穴，沒有掙扎。", "她甚至配合地翹起了臀部，{env}，理智在這一刻徹底讓位。"],
        N14: ["他故意拔出來，她竟慌張地伸手去抓那根濕淋淋的<b>肉棍</b>塞回體內。「騷娘子，還說不想要？」他大笑。", "她雙腿纏上他的腰，主動迎合，什麼俠女風範全丟到了九霄雲外。{action}。"],
        N15: ["她愛上了這種背德的快感，甚至開始期待每一次幽會。{feeling}，像溺水的人抓住浮木。", "那種瀕臨被發現的恐懼，竟轉化成更強烈的慾火。她發現自己已經徹底壞掉了。"],
        N16: ["事後她躺在草堆上，任由<b>白濁</b>從腿間流出，眼神空洞。「我是不是…壞掉了？」她喃喃自語。", "晨光透進柴房縫隙，她看著身旁鼾聲如雷的男人，心中竟生出一絲奇異的安寧。"],
        N17: ["她開始在與郭靜同床時閉上眼睛，把丈夫想像成悠八，才能獲得高潮。罪惡感越來越淡，快感越來越純粹。", "{feeling}，她已經分不清什麼是愛，什麼是慾。"],
        N18: ["江湖上開始有傳聞，說黃幫主日漸豐腴風騷，眉梢眼角盡是春意，卻再也不問武林事。", "有人說曾在杏花林見過她，衣衫半解，笑得放浪形骸，哪還有半點俠女風範。"],
        N19: ["柴房裡的喘息聲從未停止，就像某種秘密的儀式，祭奠著她死去的貞潔和重生的自由。", "她同時擁有了兩個世界：白天的幫主夫人，夜晚的柴房淫婦。{env}。"]
    };

    const colorPalette = ["#9e0bab", "#862d12", "#503a0f", "#004379", "#450b64", "#3d099f", "#012e5e", "#6d1202", "#4a0a6f", "#098994", "#2d6316", "#0c5426"];

    function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function renderStory() {
        const container = document.getElementById('storyContainer');
        let html = '';
        for (let i = 0; i <= 19; i++) {
            const texts = lib['N' + i];
            let raw = randomItem(texts);
            let cooked = raw.replace(/{(\w+)}/g, (m, k) => tokens[k] ? randomItem(tokens[k]) : m);
            cooked = cooked.replace(/(乳房|豪乳|雙乳|雪乳|奶水|乳汁|奶漬|乳尖|乳頭|奶頭|陽物|陽具|肉棍|肉杵|肉柱|巨物|龜頭|囊袋|陰唇|花心|花瓣|蕊珠|陰精|淫水|愛液|白濁|陽精|淫液|臀瓣|臀肉|褻褲)/g, '<b>$1</b>');
            const color = randomItem(colorPalette);
            html += `<div class="story-line" style="color: ${color}; border-left-color: ${color};">🌸 ${cooked}</div>`;
        }
        container.innerHTML = html;
    }

    document.getElementById('weaveBtn').addEventListener('click', renderStory);
    window.addEventListener('DOMContentLoaded', renderStory);
</script>
</body>
</html>
