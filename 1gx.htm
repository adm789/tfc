<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>悠風 · 極彩墮花 V6.1 | 61節點自適應版</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0A0005; 
        color: #ddd;
        font-family: 'Georgia', 'Microsoft JhengHei', serif;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
    }

    /* 頂欄 - 隱藏式設計 */
    .header {
        position: fixed; top: 0; left: 0; width: 100%; height: 30px;
        background: rgba(10, 0, 5, 0.8);
        border-bottom: 1px solid #4a0a6f;
        display: flex; justify-content: space-between; align-items: center;
        z-index: 1000; padding: 0 15px; opacity: 0.1; transition: opacity 0.3s;
    }
    .header:hover { opacity: 1; }
    .title { color: #e0aaff; font-size: 0.75rem; }

    /* iPad/觸控 增強控制區 (透明) */
    .touch-ctrl {
        position: fixed; bottom: 20px; right: 20px; z-index: 2000;
        display: flex; gap: 10px; opacity: 0.2;
    }
    .touch-ctrl:hover { opacity: 1; }
    .t-btn {
        width: 40px; height: 40px; background: #6d1202; border: 1px solid #9e0bab;
        color: white; border-radius: 50%; display: flex; align-items: center;
        justify-content: center; cursor: pointer; font-size: 1.2rem;
    }

    #storyContainer {
        width: 100vw; background: #1A0A15; position: absolute;
        top: 0; left: 0; padding: 40px 0; will-change: transform;
    }

    .story-line {
        padding: 10px 20px; font-weight: 500; border-left: 4px solid;
        line-height: 1.6; transition: font-size 0.2s ease; word-break: break-all;
    }

    /* 強化關鍵字標籤樣式 */
    .story-line b {
        color: #ffb7b0; background: rgba(58, 10, 42, 0.9);
        padding: 0 4px; border-radius: 4px; text-shadow: 0 0 3px #9e0bab;
    }
</style>
</head>
<body>

<div class="header">
    <div class="title">🌙 悠風 · 極彩墮花 (61 Nodes)</div>
    <div id="scrollIndicator" style="font-size: 0.7rem; color: #9e0bab;">[ 運行中 ]</div>
</div>

<div class="touch-ctrl">
    <div class="t-btn" onclick="changeFontSize(2)">+</div>
    <div class="t-btn" onclick="changeFontSize(-2)">-</div>
    <div class="t-btn" onclick="togglePlay()">⏯️</div>
    <div class="t-btn" onclick="resetAll()">⟳</div>
</div>

<div id="storyContainer"></div>

<script>
    const tokens = {
        env: ["春夜燥動的杏花香氣", "月華穿過疏枝篩落", "林間凝滯的濕潤霧氣", "寂靜如死的密林深處", "幽蘭腐熟般的甜靡氣味", "帶著花蕊甜腥的暖風"],
        feeling: ["羞恥與渴望如藤蔓絞纏", "理智在暗火中寸寸成灰", "一種近乎受刑的豐盈飽脹", "瀕臨滅頂的恍惚極樂", "道德與本能交戰後的虛脫", "如墜深淵卻又甘願沉溺"],
        action: ["難耐地蜷曲扭動", "顫抖著探入衣襟深處", "蠻橫而不講理地楔入", "如狂浪般上下吞吐", "痙攣般地絞緊又放鬆", "無意識地迎合撞擊", "指尖陷入軟肉留下紅痕"],
        solo: ["獨自對著鏡中潮紅的面龐", "在無人的深閨中輕撫濕潤", "想像著那根粗糲的觸感自瀆", "指尖撥開層層疊疊的花瓣", "揉搓著紅腫的蕊珠求取片刻解脫"]
    };

    // 建立 61 個節點，並加入「自慰視角」內容
    const lib = {};
    const templates = [
        "{env}，她感覺到{feeling}，雙腿不由自主地{action}。",
        "在那片狼藉中，{feeling}瀰漫開來，身體隨著{action}而劇烈顫抖。",
        "{env}，她{solo}，伴隨著{feeling}，感受到體內深處的空虛與渴求。",
        "她迷離地低吟，{solo}，每一次{action}都讓{feeling}更加濃烈。"
    ];

    for(let i=0; i<=60; i++) {
        lib['N'+i] = templates;
    }

    const colorPalette = ["#9e0bab", "#862d12", "#503a0f", "#004379", "#450b64", "#3d099f", "#012e5e", "#6d1202", "#4a0a6f", "#098994", "#2d6316", "#0c5426"];

    let fontSize = 22;
    let scrollPos = 30;
    let scrollSpeed = 0.8;
    let isRunning = true;

    // 避免重複：隨機洗牌函式
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderStory() {
        const container = document.getElementById('storyContainer');
        let html = '';
        // 隨機選取節點順序
        const sequence = shuffle([...Array(61).keys()]);
        
        sequence.forEach(idx => {
            let raw = templates[Math.floor(Math.random() * templates.length)];
            let cooked = raw.replace(/{(\w+)}/g, (m, k) => tokens[k] ? tokens[k][Math.floor(Math.random()*tokens[k].length)] : m);
            
            // 關鍵字高亮
            cooked = cooked.replace(/(乳房|豪乳|雙乳|雪乳|奶水|乳汁|陽物|肉杵|肉柱|花心|花瓣|蕊珠|陰精|淫水|白濁|自瀆)/g, '<b>$1</b>');
            
            const color = colorPalette[idx % colorPalette.length];
            html += `<div class="story-line" style="color: ${color}; border-left-color: ${color}; font-size: ${fontSize}px;">🌸 ${cooked}</div>`;
        });
        container.innerHTML = html;
    }

    function animate() {
        if (isRunning) {
            const container = document.getElementById('storyContainer');
            scrollPos -= scrollSpeed;
            if (Math.abs(scrollPos) > container.offsetHeight - window.innerHeight) {
                scrollPos = 30;
                renderStory(); // 捲動到底自動重整
            }
            container.style.transform = `translateY(${scrollPos}px)`;
        }
        requestAnimationFrame(animate);
    }

    // 功能函式 (支援鍵盤與 iPad 觸摸)
    function changeFontSize(delta) {
        fontSize += delta;
        document.querySelectorAll('.story-line').forEach(l => l.style.fontSize = fontSize + 'px');
    }

    function togglePlay() {
        isRunning = !isRunning;
        document.getElementById('scrollIndicator').innerText = isRunning ? "[ 運行中 ]" : "[ 已暫停 ]";
    }

    function resetAll() {
        scrollSpeed = 0.8;
        scrollPos = 30;
        renderStory();
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.key === '+' || e.key === '=') changeFontSize(2);
        if (e.key === '-' || e.key === '_') changeFontSize(-2);
        if (e.key === 'Escape') resetAll();
        if (e.key === 'ArrowUp') scrollSpeed += 0.2;
        if (e.key === 'ArrowDown') scrollSpeed = Math.max(0, scrollSpeed - 0.2);
    });

    window.addEventListener('DOMContentLoaded', () => { renderStory(); animate(); });
</script>
</body>
</html>
