<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>悠風 · 極彩墮花 V6 | 61節點導航版</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0A0005; /* 改為更深邃的背景色 */
        color: #ddd;
        font-family: 'Georgia', 'Microsoft JhengHei', serif;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
    }

    /* 頂欄 - 更緊湊與隱藏式設計 */
    .header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 28px;
        background: rgba(10, 0, 5, 0.85);
        border-bottom: 1px solid #4a0a6f;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        padding: 0 10px;
        opacity: 0.3; /* 預設半透明，滑鼠移入才顯示 */
        transition: opacity 0.3s;
    }
    .header:hover { opacity: 1; }

    .title { color: #e0aaff; font-size: 0.75rem; letter-spacing: 1px; }

    /* 內容容器 - 移除間距更緊湊 */
    #storyContainer {
        width: 100vw;
        background: #1A0A15; /* 深紫色調背景，參考 1b.htm */
        position: absolute;
        top: 0;
        left: 0;
        padding-top: 30px;
        will-change: transform;
    }

    .story-line {
        padding: 12px 20px;
        font-weight: 500;
        border-left: 4px solid;
        line-height: 1.5;
        transition: font-size 0.2s ease;
        word-break: break-all;
    }

    .story-line b {
        color: #ffb7b0;
        background: rgba(58, 10, 42, 0.8);
        padding: 0 2px;
        border-radius: 3px;
        text-shadow: 0 0 2px #9e0bab;
    }

    /* 隱藏訊息提示 */
    #statusMsg {
        position: fixed;
        bottom: 10px;
        right: 10px;
        font-size: 0.7rem;
        color: #555;
        pointer-events: none;
    }
</style>
</head>
<body>

<div class="header">
    <div class="title">🌙 悠風 · 極彩墮花 V6 (61 Nodes)</div>
    <div id="scrollIndicator" style="font-size: 0.7rem; color: #9e0bab;">[ 運行中 ]</div>
</div>

<div id="storyContainer"></div>
<div id="statusMsg">Space: Stop/Run | +/-: Size | ↑/↓: Speed</div>

<script>
    const tokens = {
        env: ["春夜燥動的杏花香氣", "月華穿過疏枝篩落", "林間凝滯的濕潤霧氣", "寂靜如死的密林深處", "星子隱沒的幽深夜幕", "帶著花蕊甜腥的暖風", "露水浸透的苔蘚氣息", "暗影浮動的月下小徑", "蟬鳴斷續的燥熱晚空", "幽蘭腐熟般的甜靡氣味"],
        feeling: ["羞恥與渴望如藤蔓絞纏", "理智在暗火中寸寸成灰", "一種近乎受刑的豐盈飽脹", "久曠身軀對雨露的極度渴念", "瀕臨滅頂的恍惚極樂", "既怕又盼的禁忌甜毒", "道德與本能交戰後的虛脫", "被窺視的戰慄快感", "如墜深淵卻又甘願沉溺"],
        action: ["難耐地蜷曲扭動", "顫抖著探入衣襟深處", "蠻橫而不講理地楔入", "如狂浪般上下吞吐", "放肆地揉捏搓弄", "痙攣般地絞緊又放鬆", "近乎癲狂地擺盪腰肢", "斷續破碎地嬌吟", "指尖陷入軟肉留下紅痕", "無意識地迎合撞擊"]
    };

    const lib = {};
    const baseTexts = [
        "{env}，她感覺到{feeling}，雙腿不由自主地{action}。",
        "在那片狼藉中，{feeling}瀰漫開來，身體隨著{action}而劇烈顫抖。",
        "月色之下，原本清冷的肌膚泛起潮紅，{feeling}讓她只能{action}。",
        "空氣中充斥著{env}，那種{feeling}的熱度逼迫她不斷地{action}。"
    ];

    // 生成 61 個節點
    for(let i=0; i<=60; i++) {
        lib['N'+i] = baseTexts;
    }

    const colorPalette = ["#9e0bab", "#862d12", "#503a0f", "#004379", "#450b64", "#3d099f", "#012e5e", "#6d1202", "#4a0a6f", "#098994", "#2d6316", "#0c5426"];

    let fontSize = 20;
    let scrollPos = 30;
    let scrollSpeed = 0.8;
    let isRunning = true;

    function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function renderStory() {
        const container = document.getElementById('storyContainer');
        let html = '';
        for (let i = 0; i <= 60; i++) {
            let raw = randomItem(lib['N' + i]);
            let cooked = raw.replace(/{(\w+)}/g, (m, k) => tokens[k] ? randomItem(tokens[k]) : m);
            // 強化關鍵字匹配
            cooked = cooked.replace(/(乳房|豪乳|雙乳|雪乳|奶水|乳汁|乳尖|乳頭|陽物|陽具|肉棍|肉杵|肉柱|巨物|龜頭|囊袋|陰唇|花心|花瓣|蕊珠|陰精|淫水|愛液|白濁|陽精|淫液|臀瓣|臀肉|褻褲)/g, '<b>$1</b>');
            
            const color = colorPalette[i % colorPalette.length];
            html += `<div class="story-line" style="color: ${color}; border-left-color: ${color}; font-size: ${fontSize}px;">🌸 ${cooked}</div>`;
        }
        container.innerHTML = html;
    }

    function animate() {
        if (isRunning) {
            const container = document.getElementById('storyContainer');
            scrollPos -= scrollSpeed;
            
            if (Math.abs(scrollPos) > container.offsetHeight - window.innerHeight) {
                scrollPos = 30;
                renderStory();
            }
            container.style.transform = `translateY(${scrollPos}px)`;
        }
        requestAnimationFrame(animate);
    }

    window.addEventListener('keydown', (e) => {
        const lines = document.querySelectorAll('.story-line');
        const indicator = document.getElementById('scrollIndicator');

        if (e.code === 'Space') {
            e.preventDefault();
            isRunning = !isRunning;
            indicator.innerText = isRunning ? "[ 運行中 ]" : "[ 已暫停 ]";
        }

        switch(e.key) {
            case '+': case '=':
                fontSize += 2;
                lines.forEach(l => l.style.fontSize = fontSize + 'px');
                break;
            case '-': case '_':
                fontSize = Math.max(10, fontSize - 2);
                lines.forEach(l => l.style.fontSize = fontSize + 'px');
                break;
            case 'ArrowUp':
                scrollSpeed += 0.2;
                break;
            case 'ArrowDown':
                scrollSpeed = Math.max(0, scrollSpeed - 0.2);
                break;
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        renderStory();
        animate();
    });
</script>
</body>
</html>
