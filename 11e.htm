<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>Lite Player Pro - 3x3 拖拽循環版</title>
    <style>
        /* ─────────────────────────────────────────
           基礎重置：禁止文字選取、消除觸控高亮、
           統一盒模型，避免各瀏覽器預設差異
        ───────────────────────────────────────── */
        * { 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
        }

        /* 頁面本體：黑底、無捲動、撐滿視窗 */
        body { 
            background: #000; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            font-family: system-ui, -apple-system, sans-serif; 
        }

        /* ─────────────────────────────────────────
           主顯示視窗：
           - 橫向捲動 + 捲動捕捉 (snap)
           - 每次捲動對齊整頁，視覺上無縫換頁
        ───────────────────────────────────────── */
        .Window { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            overflow-x: auto; 
            overflow-y: hidden; 
            scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; 
        }

        /* 每一「頁」= 3 欄橫排卡片 (九宮格一列) */
        .Page { 
            flex: 0 0 100%;          /* 每頁剛好佔滿視窗寬度 */
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            scroll-snap-align: start; 
            height: 100%; 
        }

        /* 單一媒體卡片容器 */
        .Card { 
            background: #000; 
            position: relative; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            border: 0.5px solid #222; 
            overflow: hidden; 
        }

        /* 視覺容器：縮放動畫作用的目標層
           cubic-bezier 給予彈性回彈感 */
        .Visual { 
            position: relative; 
            flex: 1; 
            overflow: hidden; 
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); 
            transform-origin: center center; 
            min-height: 0;
            background: #000;
        }

        /* 影片與圖片統一填滿卡片，保持裁切比例 */
        video, img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        /* ─────────────────────────────────────────
           標籤列：顯示媒體名稱
           hideUI 狀態下高度縮為 0 並淡出
        ───────────────────────────────────────── */
        .Label { 
            padding: 6px; 
            font-size: 11px; 
            color: #0cf; 
            background: rgba(0,0,0,0.8); 
            text-align: center; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
            transition: 0.3s;
            border-top: 1px solid #2a7faa33;
        }
        body.hideUI .Label { 
            opacity: 0; height: 0; padding: 0; border: none;
        }

        /* ─────────────────────────────────────────
           核心控制面板：3×3 九宮格佈局
           - fixed 定位，預設停在右下角
           - 可滑鼠／觸控自由拖拽移動
           - backdrop-filter 產生毛玻璃效果
        ───────────────────────────────────────── */
        #Controls { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            z-index: 999; 
            background: rgba(15, 15, 25, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px; 
            border-radius: 20px; 
            border: 1px solid #0ff; 
            display: grid; 
            grid-template-columns: repeat(3, 46px);  /* 3 欄等寬 */
            grid-template-rows: repeat(3, 46px);     /* 3 列等高 */
            gap: 8px; 
            cursor: move;       /* 滑鼠指標提示可拖拽 */
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transition: opacity 0.4s;
            touch-action: none; /* 阻止拖動面板時誤觸頁面捲動 */
        }

        /* UI 隱藏狀態：面板與資訊列同步淡出 */
        body.hideUI #Controls, body.hideUI #InfoDisplay { 
            opacity: 0; visibility: hidden; 
        }

        /* ─── 一般按鈕樣式 ─── */
        .btn { 
            width: 46px; height: 46px; 
            background: #1a1a2e; 
            color: #0ff; 
            border: 1px solid #2a7faa; 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 18px; cursor: pointer; transition: 0.2s;
        }
        /* 按下時：反色＋微縮效果提供觸覺回饋 */
        .btn:active { background: #0cf; color: #000; transform: scale(0.9); }

        /* ─── 數值調整塊（步長 / 延遲）樣式 ─── */
        .option { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #0a0f1a; border-radius: 12px; border: 1px solid #2a7faa; 
            font-family: monospace; font-size: 10px;
        }
        .val { font-weight: bold; color: #fa4; margin-bottom: 2px; }
        .step-btn { cursor: pointer; color: #0ff; font-weight: bold; padding: 0 4px; font-size: 14px; }

        /* ─── 頂部頁碼／狀態資訊列 ─── */
        #InfoDisplay { 
            position: fixed; top: 15px; left: 15px; 
            background: rgba(0,0,0,0.7); padding: 8px 16px; 
            border-radius: 50px; color: #0ff; border-left: 4px solid #0ff; 
            font-size: 12px; z-index: 1000; pointer-events: none; /* 不攔截點擊 */
        }

        /* ─── 啟動載入提示框 ─── */
        .loading { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); 
            color: #0ff; background: rgba(0,0,0,0.9); padding: 25px; 
            border-radius: 20px; z-index: 2000; text-align: center; border: 1px solid #0ff;
        }

        /* ─── 捲軸美化（細條青色） ─── */
        .Window::-webkit-scrollbar { height: 4px; }
        .Window::-webkit-scrollbar-thumb { background: #0ff; border-radius: 10px; }

        /* ─── 自動捲動按鈕：啟動中呈現綠色脈衝動畫 ─── */
        .btn.auto-on {
            background: #003d1a;
            border-color: #0f0;
            color: #0f0;
            box-shadow: 0 0 10px rgba(0, 255, 80, 0.5);
            animation: pulse-green 1.2s ease-in-out infinite;
        }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 6px rgba(0, 255, 80, 0.4); }
            50%       { box-shadow: 0 0 18px rgba(0, 255, 80, 0.9); }
        }

        /* ─── 方向指示標籤（浮現在資訊列旁） ─── */
        #AutoInfo {
            position: fixed; top: 15px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 40, 0, 0.85);
            border: 1px solid #0f0;
            border-radius: 50px;
            color: #0f0;
            font-size: 12px;
            padding: 6px 18px;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }
        #AutoInfo.visible { opacity: 1; }
        body.hideUI #AutoInfo { opacity: 0; }

        /* ─── 鍵盤提示浮層：按 ? 鍵顯示 ─── */
        #KeyHint {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.95);
            border: 1px solid #0ff;
            border-radius: 16px;
            padding: 20px 28px;
            color: #0cf;
            font-size: 13px;
            line-height: 2;
            z-index: 3000;
            display: none;           /* 預設隱藏 */
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(0,255,255,0.25);
            pointer-events: none;
        }
        #KeyHint h3 {
            margin: 0 0 10px;
            color: #fff;
            font-size: 14px;
            text-align: center;
            letter-spacing: 2px;
        }
        #KeyHint table { border-collapse: collapse; width: 100%; }
        #KeyHint td { padding: 2px 10px; }
        #KeyHint td:first-child { 
            color: #fa4; 
            font-family: monospace; 
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- 主媒體顯示區 -->
<div class="Window" id="MainViewer"></div>

<!-- 頂部狀態資訊 -->
<div id="InfoDisplay">📀 系統就緒</div>

<!-- 自動捲動狀態提示（頂部中央） -->
<div id="AutoInfo">🔄 向右 ｜ 速度 3</div>

<!-- 啟動載入提示 -->
<div id="loadingMsg" class="loading">⏳ 正在解析媒體清單...</div>

<!-- 鍵盤快捷鍵提示浮層 -->
<div id="KeyHint">
    <h3>⌨️ 鍵盤快捷鍵</h3>
    <table>
        <tr><td>← / →</td><td>上一頁 / 下一頁</td></tr>
        <tr><td>S</td><td>播放 / 暫停</td></tr>
        <tr><td>F</td><td>全螢幕 切換</td></tr>
        <tr><td>↑ / ↓</td><td>循環放大 / 縮小畫面</td></tr>
        <tr><td>M</td><td>靜音 切換</td></tr>
        <tr><td>R</td><td>重置縮放</td></tr>
        <tr><td>H</td><td>顯示 / 隱藏 UI</td></tr>
        <tr><td>A</td><td>自動捲動 開 / 關</td></tr>
        <tr><td>\</td><td>捲動方向 反轉（← / →）</td></tr>
        <tr><td>[ / ]</td><td>自動捲動 減速 / 加速</td></tr>
        <tr><td>?</td><td>顯示此說明</td></tr>
    </table>
</div>

<!-- ═══════════════════════════════════════
     控制面板（3×3 九宮格）佈局說明：
     第1列：◀ 上一頁 ｜ ⏸ 播放暫停 ｜ ▶ 下一頁
     第2列：步長調整 ｜ ⟲ 重置縮放 ｜ 延遲調整
     第3列：⛶ 全螢幕 ｜ 🔍 循環縮放 ｜ 🔇 靜音
═══════════════════════════════════════ -->
<div id="Controls">
    <!-- 第 1 列：翻頁控制 -->
    <div class="btn" onclick="changePage(-1)" title="上一頁 [←]">◀</div>
    <div class="btn" id="playPauseBtn" onclick="togglePlayState()" title="播放/暫停 [S]">⏸</div>
    <div class="btn" onclick="changePage(1)" title="下一頁 [→]">▶</div>
    
    <!-- 第 2 列：步長調整 ｜ 自動捲動開關 ｜ 延遲調整 -->
    <div class="option" title="翻頁步長">
        <div class="val" id="stepVal">1</div>
        <div><span class="step-btn" onclick="updateStep(-1)">-</span><span class="step-btn" onclick="updateStep(1)">+</span></div>
    </div>
    <div class="btn" id="autoScrollBtn" onclick="toggleAutoScroll()" title="自動捲動 [A]">🔄</div>
    <div class="option" title="自動播放間隔">
        <div class="val" id="delayVal">3.0s</div>
        <div><span class="step-btn" onclick="updateDelay(-0.5)">-</span><span class="step-btn" onclick="updateDelay(0.5)">+</span></div>
    </div>

    <!-- 第 3 列：全螢幕 ｜ 循環縮放 ｜ 靜音 -->
    <div class="btn" onclick="toggleFullscreen()" title="全螢幕 [F]">⛶</div>
    <div class="btn" id="zoomBtn" onclick="cycleZoom()" title="循環縮放 [↑放大/↓縮小]">🔍</div>
    <div class="btn" id="muteBtn" onclick="toggleMute()" title="靜音切換 [M]">🔇</div>
</div>

<script>
    // ══════════════════════════════════════════════════
    //  全域狀態變數
    // ══════════════════════════════════════════════════
    let filteredMediaList = [];   // 已過濾的媒體清單
    let isMuted      = true;      // 靜音狀態（預設靜音）
    let isPlaying    = true;      // 播放狀態
    let pageStep     = 1;         // 每次翻頁的步長
    let autoDelay    = 3.0;       // 自動翻頁秒數（秒）
    let zoomIndex    = 0;         // 當前縮放等級索引
    const zoomLevels = [1, 1.5, 2, 3, 0.5]; // 循環縮放等級：正常→放大→更大→最大→縮小
    let currentPageIndex = 0;     // 目前顯示的頁碼（從 0 起算）
    let totalPagesCount  = 0;     // 總頁數
    let listBaseDir      = "";    // 媒體清單所在的基礎目錄路徑
    let lazyObserver     = null;  // IntersectionObserver 懶加載實例
    let uiTimer          = null;  // UI 自動隱藏的計時器

    // ── 自動捲動專屬狀態 ──
    // 速度表：每個 RAF 幀推進的像素數（5 級，可用 [ ] 鍵調整）
    const scrollSpeeds  = [0.3, 0.7, 1.5, 3.0, 6.0]; // 慢 → 快（單位：px/frame ≈ 60fps）
    let scrollSpeedIdx  = 2;      // 預設第 3 級（1.5 px/frame，舒適觀賞速度）
    let scrollDir       = 1;      // 捲動方向：+1 = 向右，-1 = 向左
    let isAutoScrolling = false;  // 自動捲動是否啟動中
    let autoScrollRAF   = null;   // requestAnimationFrame 回傳 ID（用於取消）
    let scrollPos       = 0;      // 當前連續捲動累積位置（浮點數，避免整數截斷造成卡頓）

    // ── DOM 元素快取 ──
    const viewer    = document.getElementById('MainViewer');
    const info      = document.getElementById('InfoDisplay');
    const playBtn   = document.getElementById('playPauseBtn');
    const loadingDiv= document.getElementById('loadingMsg');
    const ctrlPanel = document.getElementById('Controls');
    const keyHint   = document.getElementById('KeyHint');
    const autoInfo  = document.getElementById('AutoInfo'); // 自動捲動狀態顯示（頂部中央）

    // ══════════════════════════════════════════════════
    //  1. 控制面板拖拽邏輯（滑鼠 + 觸控雙支援）
    // ══════════════════════════════════════════════════
    let isDragging = false;
    let offset = [0, 0]; // 滑鼠點擊位置與面板左上角的偏移量

    // 滑鼠按下：排除按鈕區域才啟動拖拽
    ctrlPanel.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('btn') || e.target.classList.contains('step-btn')) return;
        isDragging = true;
        offset = [ctrlPanel.offsetLeft - e.clientX, ctrlPanel.offsetTop - e.clientY];
    });

    // 滑鼠移動：根據偏移量即時更新面板位置
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        ctrlPanel.style.left   = (e.clientX + offset[0]) + 'px';
        ctrlPanel.style.top    = (e.clientY + offset[1]) + 'px';
        ctrlPanel.style.right  = 'auto'; // 取消預設右對齊
        ctrlPanel.style.bottom = 'auto'; // 取消預設下對齊
    });

    // 滑鼠放開：結束拖拽
    document.addEventListener('mouseup', () => isDragging = false);

    // 觸控開始：記錄觸控點與面板偏移
    ctrlPanel.addEventListener('touchstart', (e) => {
        if (e.target.classList.contains('btn') || e.target.classList.contains('step-btn')) return;
        isDragging = true;
        let touch = e.touches[0];
        offset = [ctrlPanel.offsetLeft - touch.clientX, ctrlPanel.offsetTop - touch.clientY];
    }, {passive: true});

    // 觸控移動：同步更新面板位置（passive:false 允許阻止預設捲動）
    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        let touch = e.touches[0];
        ctrlPanel.style.left   = (touch.clientX + offset[0]) + 'px';
        ctrlPanel.style.top    = (touch.clientY + offset[1]) + 'px';
        ctrlPanel.style.right  = 'auto';
        ctrlPanel.style.bottom = 'auto';
    }, {passive: false});

    // 觸控結束：結束拖拽
    document.addEventListener('touchend', () => isDragging = false);

    // ══════════════════════════════════════════════════
    //  2. 路徑解析工具函式
    // ══════════════════════════════════════════════════

    // 將反斜線統一轉為正斜線（相容 Windows 路徑）
    function normalizePath(p) { return p ? p.replace(/\\/g, '/') : ""; }

    // 取得路徑的目錄部分（去掉最後的檔名）
    function getDirPath(p) { let n = normalizePath(p); return n.substring(0, n.lastIndexOf('/') + 1); }

    // 解析相對路徑為絕對路徑，並補齊 file:/// 協定前綴
    function resolvePath(rel, base) {
        if (!rel) return "";
        if (/^(http|https|file|data):/.test(rel) || /^[a-zA-Z]:/.test(rel)) {
            return (/^[a-zA-Z]:/.test(rel) && !rel.startsWith('file:///')) ? 'file:///' + rel : rel;
        }
        return base + rel;
    }

    // ══════════════════════════════════════════════════
    //  3. 動態 Script 注入載入清單
    //     原理：利用 <script src> 繞過 file:// 的 CORS 限制，
    //     清單檔需以 var mediaList = [...] 格式匯出
    // ══════════════════════════════════════════════════
    async function loadList(url) {
        return new Promise((resolve, reject) => {
            let finalUrl = normalizePath(url);
            // 補齊 Windows 磁碟路徑的 file:/// 前綴
            if (/^[a-zA-Z]:/.test(finalUrl) && !finalUrl.startsWith('file:///')) finalUrl = 'file:///' + finalUrl;
            
            listBaseDir = getDirPath(finalUrl); // 記錄清單所在目錄，供後續相對路徑解析使用
            const script = document.createElement('script');
            script.src = finalUrl;
            script.onload = () => {
                const data = window.mediaList || (typeof mediaList !== 'undefined' ? mediaList : null);
                data ? resolve(data) : reject("清單格式錯誤 (需為 mediaList 陣列)");
            };
            script.onerror = () => reject("無法載入路徑: " + url);
            document.head.appendChild(script);
        });
    }

    // ══════════════════════════════════════════════════
    //  4. 翻頁邏輯（支援無限循環）
    // ══════════════════════════════════════════════════
    function changePage(dir) {
        if (totalPagesCount <= 1) return;
        
        let nextIndex = currentPageIndex + (dir * pageStep);

        // 超出末頁 → 跳回第一頁；小於首頁 → 跳到最後一頁
        if (nextIndex >= totalPagesCount) {
            nextIndex = 0;
        } else if (nextIndex < 0) {
            nextIndex = totalPagesCount - 1;
        }

        currentPageIndex = nextIndex;
        // 以平滑捲動方式定位到目標頁
        viewer.scrollTo({ left: currentPageIndex * viewer.clientWidth, behavior: 'smooth' });
        
        // 等待捲動動畫完成後再重新評估影片播放狀態
        setTimeout(triggerVisibleStates, 300);
    }

    // ══════════════════════════════════════════════════
    //  5. 懶加載（IntersectionObserver）
    //     只在卡片進入視野範圍（+500px 預載）時才真正載入 src，
    //     大幅減少初始載入時間與頻寬消耗
    // ══════════════════════════════════════════════════
    function initLazyLoad() {
        if (lazyObserver) lazyObserver.disconnect(); // 重建前先清除舊的觀察器
        lazyObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card  = entry.target;
                    const media = card._mediaData;
                    if (media && !media.loaded) {
                        const el = card.querySelector('video, img');
                        el.src = resolvePath(media.s, listBaseDir); // 正式指派媒體路徑
                        if (media.t === 'vid' && isPlaying) el.play().catch(()=>{});
                        media.loaded = true; // 標記已加載，避免重複觸發
                    }
                }
            });
        }, { rootMargin: '500px' }); // 進入視野前 500px 即開始預載
        document.querySelectorAll('.Card').forEach(c => lazyObserver.observe(c));
    }

    // 依可見性決定各影片的播放或暫停，並同步靜音狀態
    function triggerVisibleStates() {
        document.querySelectorAll('video').forEach(v => {
            const rect    = v.getBoundingClientRect();
            const visible = rect.left < window.innerWidth && rect.right > 0;
            if (visible && isPlaying && v.src) v.play().catch(()=>{});
            else v.pause();
            v.muted = isMuted;
        });
        updateStatus();
    }

    // 更新頂部資訊列文字
    function updateStatus() {
        info.innerText = `📺 ${currentPageIndex + 1} / ${totalPagesCount} | 共 ${filteredMediaList.length} | 步長: ${pageStep}`;
    }

    // ══════════════════════════════════════════════════
    //  6. UI 按鈕功能實作
    // ══════════════════════════════════════════════════

    // 播放 / 暫停切換
    function togglePlayState() {
        isPlaying = !isPlaying;
        playBtn.innerText = isPlaying ? '⏸' : '▶';
        triggerVisibleStates();
    }

    // 靜音 / 開聲切換
    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊';
        triggerVisibleStates();
    }

    // 循環切換縮放等級（1 → 1.5 → 2 → 3 → 0.5 → 1 ...）
    function cycleZoom() {
        zoomIndex = (zoomIndex + 1) % zoomLevels.length;
        applyZoom();
    }

    // 向上循環縮放（↑ 鍵）：等級遞增，超出末端則回到首端
    function zoomUp() {
        zoomIndex = (zoomIndex + 1) % zoomLevels.length;
        applyZoom();
    }

    // 向下循環縮放（↓ 鍵）：等級遞減，低於首端則跳到末端
    function zoomDown() {
        zoomIndex = (zoomIndex - 1 + zoomLevels.length) % zoomLevels.length;
        applyZoom();
    }

    // 套用當前 zoomIndex 對應的縮放值到所有 .Visual 元素
    function applyZoom() {
        const s = zoomLevels[zoomIndex];
        document.querySelectorAll('.Visual').forEach(v => v.style.transform = `scale(${s})`);
        document.getElementById('zoomBtn').innerText = s === 1 ? '🔍' : `🔍${s}x`;
    }

    // 重置縮放回 1:1 原始大小
    function resetZoom() {
        zoomIndex = 0;
        document.querySelectorAll('.Visual').forEach(v => v.style.transform = 'scale(1)');
        document.getElementById('zoomBtn').innerText = '🔍';
    }

    // ══════════════════════════════════════════════════
    //  自動捲動系統（Auto-Scroll）
    //  原理：
    //  ┌─ requestAnimationFrame 逐幀推進 scrollPos（浮點數）
    //  ├─ 方向由 scrollDir 控制（+1右 / -1左）
    //  ├─ 到達末端時無縫跳回對端（真正無限循環）
    //  ├─ 捲動中同步更新 currentPageIndex 與影片播放狀態
    //  └─ 停止時 cancelAnimationFrame 釋放資源
    //
    //  按鍵對應：
    //  A   ： 開 / 關 自動捲動
    //  \   ： 反轉方向（← → 互換）
    //  [   ： 減速（速度等級 -1）
    //  ]   ： 加速（速度等級 +1）
    // ══════════════════════════════════════════════════

    // 更新頂部中央的自動捲動狀態列文字
    function updateAutoInfo() {
        const dirLabel = scrollDir === 1 ? '→ 向右' : '← 向左';
        const lvl      = scrollSpeedIdx + 1; // 顯示 1~5 級
        autoInfo.textContent = `🔄 ${dirLabel}  ｜  速度 ${lvl} / 5`;
    }

    // 啟動自動捲動：初始化 scrollPos 並啟動 RAF 迴圈
    function startAutoScroll() {
        isAutoScrolling = true;
        scrollPos = viewer.scrollLeft;    // 從當前位置接續，不強制重置到頁首

        // 暫時關閉 scroll-snap，讓捲動可以自由連續推進（不會被捕捉打斷）
        viewer.style.scrollSnapType = 'none';
        viewer.style.scrollBehavior = 'auto';

        document.getElementById('autoScrollBtn').classList.add('auto-on');
        autoInfo.classList.add('visible');
        updateAutoInfo();
        autoScrollLoop();
    }

    // 停止自動捲動：取消 RAF、恢復 snap 設定、更新按鈕狀態
    function stopAutoScroll() {
        isAutoScrolling = false;
        if (autoScrollRAF) { cancelAnimationFrame(autoScrollRAF); autoScrollRAF = null; }

        // 恢復 scroll-snap 以利手動翻頁對齊
        viewer.style.scrollSnapType = '';
        viewer.style.scrollBehavior = '';

        // 停止時對齊最近的整頁，避免停在半頁
        viewer.scrollTo({ left: currentPageIndex * viewer.clientWidth, behavior: 'smooth' });

        document.getElementById('autoScrollBtn').classList.remove('auto-on');
        autoInfo.classList.remove('visible');
    }

    // 開 / 關 切換
    function toggleAutoScroll() {
        isAutoScrolling ? stopAutoScroll() : startAutoScroll();
    }

    // 每幀執行的捲動迴圈（核心）
    function autoScrollLoop() {
        if (!isAutoScrolling) return;

        const speed    = scrollSpeeds[scrollSpeedIdx]; // 當前幀移動像素數
        const maxLeft  = viewer.scrollWidth - viewer.clientWidth; // 最大可捲動距離

        scrollPos += speed * scrollDir; // 累積位置（浮點數保精度）

        // ── 無縫循環邊界處理 ──
        if (scrollDir === 1 && scrollPos >= maxLeft) {
            // 向右到達末端 → 瞬間跳回最左（位置 0）
            scrollPos = 0;
        } else if (scrollDir === -1 && scrollPos <= 0) {
            // 向左到達首端 → 瞬間跳到最右端
            scrollPos = maxLeft;
        }

        viewer.scrollLeft = scrollPos; // 直接賦值（非 smooth，避免與 RAF 衝突）

        // 根據目前 scrollLeft 同步更新頁碼（供資訊列顯示）
        const newIdx = Math.round(viewer.scrollLeft / viewer.clientWidth);
        if (newIdx !== currentPageIndex) {
            currentPageIndex = newIdx;
            triggerVisibleStates(); // 更新影片播放／暫停狀態
        }

        autoScrollRAF = requestAnimationFrame(autoScrollLoop); // 繼續下一幀
    }

    // 調整速度等級（[ 鍵減速，] 鍵加速，邊界時循環）
    function changeScrollSpeed(delta) {
        scrollSpeedIdx = (scrollSpeedIdx + delta + scrollSpeeds.length) % scrollSpeeds.length;
        updateAutoInfo(); // 即時更新顯示
    }

    // 反轉捲動方向（\ 鍵）
    function reverseScrollDir() {
        scrollDir = -scrollDir;
        updateAutoInfo();
    }

    // 調整翻頁步長（最小值 1）
    function updateStep(n) {
        pageStep = Math.max(1, pageStep + n);
        document.getElementById('stepVal').innerText = pageStep;
    }

    // 調整自動播放延遲（最小值 0.5 秒）
    function updateDelay(n) {
        autoDelay = Math.max(0.5, autoDelay + n);
        document.getElementById('delayVal').innerText = autoDelay.toFixed(1) + 's';
    }

    // 切換全螢幕（進入 / 退出）
    function toggleFullscreen() {
        document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
    }

    // ══════════════════════════════════════════════════
    //  7. ⌨️ 鍵盤快捷鍵
    //     ← / →  ：上一頁 / 下一頁（對應面板第1列按鈕）
    //     S       ：播放 / 暫停（對應面板第1列中間按鈕）
    //     F       ：全螢幕切換（對應面板第3列第1個按鈕）
    //     ↑ / ↓  ：循環放大 / 循環縮小（對應面板第3列第2個按鈕）
    //     M       ：靜音切換（對應面板第3列第3個按鈕）
    //     R       ：重置縮放（對應面板第2列中間按鈕）
    //     H       ：顯示 / 隱藏整體 UI
    //     ?       ：顯示 / 隱藏快捷鍵說明浮層
    // ══════════════════════════════════════════════════
    let keyHintTimer = null; // 說明浮層自動消失計時器

    document.addEventListener('keydown', (e) => {
        // 若正在輸入框中打字則忽略
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        switch (e.key) {
            // ── 翻頁（← 上一頁 / → 下一頁）──
            case 'ArrowLeft':
                e.preventDefault();
                changePage(-1);
                break;
            case 'ArrowRight':
                e.preventDefault();
                changePage(1);
                break;

            // ── S 鍵：播放 / 暫停 ──
            case 's':
            case 'S':
                togglePlayState();
                break;

            // ── F 鍵：全螢幕切換 ──
            case 'f':
            case 'F':
                toggleFullscreen();
                break;

            // ── ↑ 鍵：循環放大（zoomLevels 向前遞增） ──
            case 'ArrowUp':
                e.preventDefault();
                zoomUp();
                break;

            // ── ↓ 鍵：循環縮小（zoomLevels 向後遞減） ──
            case 'ArrowDown':
                e.preventDefault();
                zoomDown();
                break;

            // ── M 鍵：靜音切換 ──
            case 'm':
            case 'M':
                toggleMute();
                break;

            // ── R 鍵：重置縮放為 1:1 ──
            case 'r':
            case 'R':
                resetZoom();
                break;

            // ── H 鍵：手動切換 UI 顯示 / 隱藏 ──
            case 'h':
            case 'H':
                document.body.classList.toggle('hideUI');
                break;

            // ── A 鍵：自動捲動 開 / 關 ──
            case 'a':
            case 'A':
                toggleAutoScroll();
                break;

            // ── \ 鍵：反轉自動捲動方向（← / → 互換） ──
            case '\\':
                reverseScrollDir();
                break;

            // ── [ 鍵：自動捲動減速（速度等級 -1，循環） ──
            case '[':
                changeScrollSpeed(-1);
                break;

            // ── ] 鍵：自動捲動加速（速度等級 +1，循環） ──
            case ']':
                changeScrollSpeed(1);
                break;

            // ── ? 鍵：顯示快捷鍵說明，3 秒後自動消失 ──
            case '?':
                keyHint.style.display = 'block';
                clearTimeout(keyHintTimer);
                keyHintTimer = setTimeout(() => { keyHint.style.display = 'none'; }, 3000);
                break;
        }

        // 按下任意鍵均喚醒 UI（重設自動隱藏倒數）
        showUI();
    });

    // ══════════════════════════════════════════════════
    //  8. 捲動同步：手動拖動捲軸時同步更新頁碼
    // ══════════════════════════════════════════════════
    viewer.addEventListener('scroll', () => {
        let idx = Math.round(viewer.scrollLeft / viewer.clientWidth);
        if (idx !== currentPageIndex) {
            currentPageIndex = idx;
            triggerVisibleStates();
        }
    });

    // ══════════════════════════════════════════════════
    //  9. UI 自動隱藏機制
    //     偵測滑鼠移動 / 觸控 / 點擊後重置 4 秒計時器，
    //     時間到即加上 hideUI class 讓面板淡出
    // ══════════════════════════════════════════════════
    function showUI() {
        document.body.classList.remove('hideUI');
        clearTimeout(uiTimer);
        uiTimer = setTimeout(() => { 
            if (!isDragging) document.body.classList.add('hideUI'); 
        }, 4000);
    }
    ['mousemove', 'touchstart', 'click'].forEach(e => window.addEventListener(e, showUI));

    // ══════════════════════════════════════════════════
    //  10. 啟動流程
    //      讀取 URL 參數 ?list= 指定清單路徑，
    //      預設使用同目錄的 list.js
    // ══════════════════════════════════════════════════
    async function init() {
        const params  = new URLSearchParams(window.location.search);
        let listUrl   = params.get('list') || 'list.js';
        
        try {
            const rawData = await loadList(listUrl);
            // 為每個媒體項目附加 loaded 旗標，供懶加載判斷
            filteredMediaList = rawData.map(item => ({...item, loaded: false}));
            totalPagesCount   = Math.ceil(filteredMediaList.length / 3); // 每頁 3 格，計算總頁數
            
            renderGallery();
            loadingDiv.style.display = 'none'; // 載入完成後隱藏提示框
        } catch (e) {
            loadingDiv.innerHTML = `❌ 錯誤: ${e}<br>請檢查 ?list= 路徑是否正確`;
            loadingDiv.style.color = '#f55';
        }
    }

    // ══════════════════════════════════════════════════
    //  11. 渲染媒體畫廊
    //      根據 filteredMediaList 動態建立 Page > Card > Visual 結構
    // ══════════════════════════════════════════════════
    function renderGallery() {
        viewer.innerHTML = ''; // 清空舊內容

        for (let p = 0; p < totalPagesCount; p++) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'Page';

            // 每頁最多 3 個卡片（最後一頁可能不足 3 個）
            for (let i = p * 3; i < Math.min((p + 1) * 3, filteredMediaList.length); i++) {
                const media = filteredMediaList[i];
                const card  = document.createElement('div');
                card.className  = 'Card';
                card._mediaData = media; // 將媒體資料掛載到 DOM 節點，供懶加載讀取

                // 建立視覺容器（縮放動畫目標層）
                const visual = document.createElement('div');
                visual.className = 'Visual';

                // 依媒體類型建立 <video> 或 <img> 元素
                const el = document.createElement(media.t === 'vid' ? 'video' : 'img');
                if (media.t === 'vid') { 
                    el.loop      = true;  // 影片循環播放
                    el.playsInline = true; // 行動裝置內嵌播放（不強制全螢幕）
                    el.muted     = true;  // 預設靜音（瀏覽器自動播放政策要求）
                }

                // 底部標籤：顯示序號與檔名
                const label = document.createElement('div');
                label.className = 'Label';
                label.innerText = `#${i+1} ${media.n || media.s.split('/').pop()}`;

                visual.appendChild(el);
                card.appendChild(visual);
                card.appendChild(label);
                pageDiv.appendChild(card);
            }
            viewer.appendChild(pageDiv);
        }

        initLazyLoad(); // 所有卡片建立完畢後啟動懶加載觀察器
        updateStatus(); // 更新頂部資訊列
    }

    // 頁面完全載入後執行初始化
    window.onload = init;
</script>

</html><!設計思路：
- **`A` 鍵** = 自動捲動開關（Auto-scroll toggle）
- **`[` / `]`** = 減速 / 加速（5級速度循環，顯示在資訊列）
- **方向**：預設向右，按 **`\`** 反轉方向
- 自動捲動時以 `requestAnimationFrame` 逐像素平移，到末頁自動跳回首頁（真正無縫循環）
- 面板第2列中間的 `⟲` 改為 **`🔄`**（自動捲動狀態指示），原重置縮放移到 `R` 鍵保留現在把新按鍵加進 keydown 處理器：新增自動捲動功能整理如下：
**新增按鍵：**
| 按鍵 | 功能 |
|------|------|
| `A` | 自動捲動 開 / 關 |
| `\` | 反轉方向（← / → 互換） |
| `[` | 減速（循環，共 5 級） |
| `]` | 加速（循環，共 5 級） |
**設計細節：**
- 速度 5 級：`0.3 → 0.7 → 1.5 → 3.0 → 6.0 px/frame`，預設第 3 級（流暢觀賞節奏）
- 以 `requestAnimationFrame` 逐像素推進，**完全無段差**，不跳頁
- 到達末端瞬間跳回對端，視覺上**真正無縫循環**
- 啟動時暫停 scroll-snap（避免被頁面捕捉打斷）；停止時自動對齊最近整頁
- 啟動中按鈕呈**綠色脈衝動畫**，頂部中央顯示方向與速度等級
- 捲動過程中影片播放／暫停狀態**同步更新**>
