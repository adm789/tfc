<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>悠風慫力：極致長篇編織器 V3</title>
<style>
    /* 螢幕鋪滿佈局 */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#050505; color:#999; font:16px/1.4 "Microsoft JhengHei",serif; overflow-x:hidden; }
    
    /* 極簡控制區 */
    .header { width:100%; background:#1a0000; border-bottom:1px solid #400; padding:5px 15px; display:flex; justify-content:space-between; align-items:center; position:fixed; top:0; z-index:100; }
    .title { color:#c62828; font-size:14px; letter-spacing:2px; font-weight:bold; }
    .go-btn { background:#b0120a; color:#fff; border:none; padding:4px 25px; cursor:pointer; font-weight:bold; border-radius:2px; font-size:13px; }
    .go-btn:hover { background:#ff1744; box-shadow:0 0 10px #f00; }

    /* 全螢幕輸出區 */
    #out { width:100%; min-height:100vh; padding:60px 20px 20px 20px; display:none; }
    .ln { display:block; margin-bottom:15px; border-left:3px solid #300; padding-left:15px; text-align:justify; transition:all 0.5s; }
    
    /* 詞庫隨機染色 */
    .hl { font-weight:bold; }
</style>
</head>
<body>

<div class="header">
    <div class="title">悠風慫力 · 長篇動態編織 [Full-Screen Mode]</div>
    <button class="go-btn" onclick="weaveFull()">[ EXECUTING WEAVE ]</button>
</div>

<div id="out"></div>

<script>
// 詞庫系統：增加文本厚度
const tokens = {
    env: ["春夜燥熱的風","月光透過稀疏枝葉","林間瀰漫的杏花香","靜謐死寂的密林","月隱星沈的深夜"],
    feeling: ["羞恥與渴望並生","理智在慾火中化為灰燼","一種近乎折磨的豐盈","久曠身體的極度渴望","瀕死的極樂"],
    action: ["劇烈起伏","顫抖著探入","蠻不講理地釘入","瘋狂地吞吐","肆無忌憚地揉捏"]
};

// 擴展後的長篇節點文本庫
const lib = {
    N0: [
        "{env}，黃絨立於高處枝椏，衣襟下的束縛早已勒出一道道紅痕，每一次呼吸，褻衣便與緊繃肌膚相互研磨，激起一陣陣{feeling}。",
        "悠八在樹下仰頭，看著那高高在上、嬌不可攀的美人，此刻正似一條無骨的蛇，在高處難耐地{action}。"
    ],
    N1: [
        "束縛一去，那被壓抑許久的雪膩猛然彈跳而出，宛如兩座被月光浸透的玉山，乳尖殷紅如硃砂，正掛著{adj}的瓊漿。",
        "她雙手捧住那沈甸甸的柔膩，十指陷入軟肉之中，隨著她的揉弄，兩道細細的白線劃破夜空，帶著體溫的乳香滴落。"
    ],
    N2: [
        "腳下一虛，她如斷線紙鳶墜入一個帶著濃烈汗味的懷抱。悠八如餓虎撲食將她死死抵在粗糙樹幹上，大嘴毫不客氣地噙住了那點紅蕊。",
        "脆弱的褻褲在暴力下分崩離析，碎片如白蝶般飄落。微涼夜風灌入腿間，一個滾燙堅硬如鐵的巨物，死死抵住了她那顫抖的花心。"
    ],
    N3: [
        "千鈞一髮之際，指尖凝聚的一縷真氣如蘭花拂穴，精準點在悠八「羶中穴」。林間復歸死寂，唯有黃絨急促的喘息與遠處蟲鳴交織。",
        "黃絨背靠粗糲樹皮滑坐在地，夜風拂過赤裸大腿與狼藉奶漬，帶來刺骨涼意，卻冷卻不了體內那股四處亂竄的燥熱。"
    ],
    N4: [
        "她借著斑駁月色，看著悠八褲子褪至膝彎，那方才還氣勢洶洶的陽物，此刻隨著昏睡竟縮成一團軟肉，蟄伏在濃密的黑草叢中。",
        "「男子的那話兒，竟能如此縮放自如？」這荒唐念頭一旦升起便難以遏制，一種「無人知曉」的放縱感在她心中悄然滋生。"
    ],
    N5: [
        "隨著經脈暢通，那物事在她掌心握住下，竟似活過來一般，突突跳動，以肉眼可見的速度充血、膨脹、變硬，散發出令人窒息的雄性腥氣。",
        "一根青筋暴起、碩大無朋的肉杵怒挺在眼前。那前端上翹的弧度猙獰而驕傲，令她呼吸急促，胸前雪乳隨著劇烈喘息上下起伏。"
    ],
    N6: [
        "月下林間，一代俠女衣衫半解，一手品簫、一手撫琴。這幅畫面淫靡而荒誕，卻透著極致的艷麗。指尖的慰藉終究只是隔靴搔癢。",
        "她一邊嚕動那根粗大的肉棍，一邊揉搓自己的陰唇，淫水順著大腿流下。體內那口深井越發乾渴，渴望著被粗大實物填滿撐開。"
    ],
    N7: [
        "她身子一軟，跨坐在悠八粗壯腰腹之上。那一根滾燙鐵杵嵌在肥美臀瓣間，隨著腰肢擺動，在那條泥濘溝壑中來回滑動，一次次擦過紅腫陰唇。",
        "這種邊緣的試探將快感拉長到極致，每一寸肌膚的摩擦都在叫囂著最後的結合。那熱度燙得驚人，彷彿要將她融化在這無邊春夜裡。"
    ],
    N8: [
        "「便只這一次……權當一場春夢……」黃絨決然下沉，粗糲碩大的龜頭悍然撐開花瓣。緊緻甬道被強行拓寬，一種近乎撕裂的充實感瞬間填滿空虛。",
        "水聲靡靡，泥濘四濺。她在鐵柱上瘋狂吞吐，碩大雪峰隨之劇烈晃動，甩出令人目眩的乳白弧線。陰精如潮噴薄，與胸前乳汁激射而出。"
    ],
    N9: [
        "兩人的下身依舊狼藉地糾纏在一起，白皙與黝黑達成詭異的和諧。她看著腿間混合著白濁陽精與乳白奶汁的泥濘，眼神複雜難辨。",
        "碎了一地，卻又在某種隱秘角落獲得了前所未有的重生。那一夜，春風無力，杏花零落，在這片狼藉中，那位冰清玉潔的黃幫主已然不再。"
    ]
};

function weaveFull() {
    const o = document.getElementById('out');
    const colors = ["#c62828", "#ad1457", "#d81b60", "#880e4f", "#b71c1c"];
    let html = "";
    
    for(let i=0; i<=9; i++) {
        let n = 'N'+i;
        let pool = lib[n];
        let raw = pool[Math.floor(Math.random()*pool.length)];
        
        // 執行詞庫替換
        let cooked = raw.replace(/{(\w+)}/g, (m, key) => {
            let tPool = tokens[key];
            return `<span class="hl">${tPool[Math.floor(Math.random()*tPool.length)]}</span>`;
        });
        
        html += `<div class="ln" style="color:${colors[i%5]}">${cooked}</div>`;
    }
    
    o.innerHTML = html;
    o.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
