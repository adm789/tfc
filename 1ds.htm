<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>杏夜絮語 · 完全雅化版 | 131圖文隨機輪迴</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: #1a0e0a;
    font-family: 'Georgia','Times New Roman','Microsoft JhengHei',serif;
    line-height: 1.7;
    overflow-x: hidden;
}

/* ═══ 頂欄 ═══ */
.header {
    position: fixed; top:0; left:0; width:100%;
    background: rgba(26,14,10,0.93);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid #bc7a5e;
    display: flex; justify-content:space-between; align-items:center;
    z-index: 1000;
    padding: 7px 16px; gap:8px; flex-wrap:wrap;
}
.title {
    color:#e8c4b0; font-size:0.80rem; letter-spacing:2px;
    flex:1 1 auto; white-space:nowrap;
}
.ctrl-group { display:flex; align-items:center; gap:5px; flex-shrink:0; }

.ctrl-btn {
    background:#5e2e22; border:none; color:#f0ddcf;
    padding:5px 11px; border-radius:40px; cursor:pointer;
    font-size:0.80rem; font-weight:bold; letter-spacing:1px;
    transition: background .18s, transform .1s;
    user-select:none; -webkit-user-select:none;
    white-space:nowrap;
}
.ctrl-btn:hover  { background:#8e5a4a; color:#fff; }
.ctrl-btn:active { transform:scale(.93); }
.ctrl-btn.active { background:#8e4820; color:#ffe8d0; }

.speed-dots { display:flex; gap:3px; align-items:center; padding:0 2px; }
.dot { width:7px; height:7px; border-radius:50%; background:#5e2e22; transition:background .25s; }
.dot.on { background:#e8a060; }

.status-label {
    color:#c0906a; font-size:0.70rem; letter-spacing:1px;
    padding:0 2px; white-space:nowrap; min-width:56px; text-align:center;
}

/* ═══ 主容器 ═══ */
#storyContainer {
    padding-top:58px;
    width:100%; max-width:800px; margin:0 auto;
    background:#fef7ef; min-height:100vh;
    box-shadow:0 0 30px rgba(0,0,0,.22);
}

.story-block {
    padding:16px 12px; border-bottom:1px solid #ecd9c8;
    display:flex; flex-direction:column; gap:4px;
    opacity:0; transform:translateY(18px);
    transition: opacity .65s ease, transform .65s ease;
}
.story-block.visible { opacity:1; transform:translateY(0); }

/* 漸層彩色文字 */
.story-text {
    position: relative;
    font-size: var(--txt-size,1.15rem);
    font-weight:500;
    border-left:4px solid #bc7a5e;
    padding:10px 16px 10px 20px;
    border-radius:0 16px 16px 0;
    line-height:1.88;
    background: rgba(255,245,235,0.50);
}
.story-text span.txt {
    background: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
}

/* 圖片換圖 */
.img-wrap {
    position:relative; border-radius:20px; overflow:hidden;
    cursor:pointer; user-select:none; -webkit-user-select:none;
}
.story-img {
    width:100%; max-height:600px; object-fit:contain;
    background:#2a1a14; display:block; border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.2); border:1px solid #ecd9c8;
}
.img-hint {
    position:absolute; bottom:10px; right:14px;
    background:rgba(26,14,10,.62); color:#e8c4b0;
    font-size:0.68rem; letter-spacing:1px;
    padding:3px 10px; border-radius:20px;
    pointer-events:none; opacity:0; transition:opacity .4s;
}
.img-wrap:hover .img-hint { opacity:1; }

@keyframes imgFlash { 0%{opacity:1} 40%{opacity:0} 100%{opacity:1} }
.img-changing { animation:imgFlash .38s ease; }

.bottom-trigger { text-align:center; padding:40px; color:#b08a74; font-size:.8rem; }

#speedToast {
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
    background:rgba(26,14,10,.88); color:#e8c4b0;
    padding:6px 20px; border-radius:40px; font-size:.76rem; letter-spacing:2px;
    pointer-events:none; opacity:0; transition:opacity .3s; z-index:999;
}
#speedToast.show { opacity:1; }
</style>
</head>
<body>

<div class="header">
    <div class="title">🌙 杏夜絮語 · 雅化版</div>
    <div class="ctrl-group">
        <button class="ctrl-btn" id="sizeUpBtn"   title="放大字體  ]">A+</button>
        <button class="ctrl-btn" id="sizeDownBtn" title="縮小字體  [">A−</button>

        <button class="ctrl-btn" id="slowBtn" title="減速  − ↓">−</button>
        <div class="speed-dots" id="speedDots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div>
        </div>
        <button class="ctrl-btn" id="fastBtn" title="加速  + ↑">+</button>

        <span class="status-label" id="statusLabel">[ 載入中 ]</span>

        <button class="ctrl-btn active" id="pauseBtn"   title="暫停/巡航  Space">⏯ 巡航</button>
        <button class="ctrl-btn"        id="restartBtn" title="重讀  ⟳">⟳</button>
    </div>
</div>

<div id="storyContainer"></div>
<div id="speedToast"></div>

<script>
const cleanLines = [
    "月光落在鎖骨上，涼涼的，像一片薄霜。",
    "我閉上眼，讓自己回到那片杏花林裡，風從耳邊經過。",
    "指尖輕輕劃過小腹，不是挑逗，只是確認自己還在。",
    "鏡子裡的女人滿臉潮紅，那是活著的證明。",
    "我讓自己保持在一種將睡未睡的邊緣，像走在雲上。",
    "學會了在情緒最濃的時候停下來，讓它在身體裡自己發酵。",
    "溫熱的油塗在皮膚上，滑膩的感覺像另一層溫柔的衣。",
    "手指在腰側慢慢游移，像在讀一本很久沒翻的書。",
    "有時只是撫摸自己的頭髮和臉頰，也能感到一種奇異的安心。",
    "我試著想像一雙手，不是任何人的，只是最懂我力道的手。",
    "我把留聲機放得很小聲，讓音樂和呼吸重疊。",
    "我不再急著天亮，而是讓夜一寸一寸經過我。",
    "我把手心貼在胸口，感覺心跳從混亂慢慢變回規律。",
    "我把枕頭墊在腰下，讓身體微微上翹，像一片柔軟的沙丘。",
    "難過的時候不是哭，是把被子拉到鼻尖，只露出一雙眼睛。",
    "想像杏花瓣落在我赤裸的小腹上，冰涼與溫熱交錯。",
    "我把枕頭夾在腿間，側躺著，像回到母親的子宮。",
    "我對著語音備忘錄說話，錄下自己的聲音，第二天又刪掉。",
    "今夜不追求任何答案，只享受那種漫長的、安靜的等待。",
    "薄衫下鎖骨的線條，我隔著布料輕輕描繪，像在畫一幅畫。",
    "有時只是把手放在心口，不加任何動作，光是體溫就夠了。",
    "我用兩面鏡子，看見自己身體的曲線——像一幅安靜的畫。",
    "觸摸不是為了填補誰，而是確認這具身體還活著、還會感受。",
    "指尖沿著鎖骨來回游移，卻遲遲不肯往下——我要把夜晚拉長。",
    "將睡未睡的懸崖最磨人，我停下所有思緒，大口喘氣。",
    "我翻身趴著，把臉埋進枕頭裡，輕輕磨蹭。",
    "我用羽毛輕輕掃過手臂和脖子，那種癢讓人想笑又想哭。",
    "我從來不知道，自己可以把自己哄得這麼安靜。",
    "今夜想像自己是一隻月下的鹿，安靜地喝水。",
    "自處結束後，我拉好被子，翻身，一夜無夢。",
    "高潮會有的，只是不是身體的那種——是心突然鬆開的那種。",
    "過後我蜷縮著，像一隻被雨淋濕的貓，但雨已經停了。",
    "我故意只撫摸大腿外側，不碰最敏感的地方，讓溫柔自己漲滿。",
    "我用冰塊輕點手腕內側，涼意順著血管往上爬。",
    "我學會了用呼吸控制情緒：吸氣時收緊，吐氣時鬆開。",
    "我學會了在自處後好好清洗自己，像一場溫柔的告別。",
    "過後我躺在床上發呆，月光照著地板上那灘我的影子。",
    "我讓自己跪趴在床上，回頭從鏡子裡看見那副安靜的身體。",
    "我讓自己緩慢地放鬆，像潮水一寸一寸漲起來，再慢慢退去。",
    "把溫熱的油塗滿整個身體，滑溜溜的，像一條剛出生的魚。",
    "我用另一隻手輕掐手臂內側，微微的痛讓呼吸更沉。",
    "沒有羞恥，也沒有觀眾。今夜我只是我自己的訪客。",
    "今夜夢見一片無人的杏花林，花瓣落了我滿身。",
    "今夜又無睡意，我躺在那張寬大的床上，聽自己的呼吸。",
    "鎖骨下方的皮膚特別薄，我能看見藍色的血管。",
    "我學著用最輕的力道撫摸自己的前臂，一圈、兩圈……呼吸變慢了。",
    "自處是我和自己的秘密約會，不需要打扮，不需要說話。",
    "我咬住枕角，怕自己笑出聲。其實整間屋子只有我一人。",
    "今夜沒有盡頭，只有漫長的、濕潤的、不求解脫的夜。",
    "兩根手指輕輕按壓太陽穴，疲憊像潮水一樣湧上來又退去。",
    "過後的最安靜那幾分鐘，我聽著自己的心跳，像雨後屋簷滴水。",
    "自處讓我記住：這副身體首先是自己的，然後才是世界的。",
    "小腹深處有一團溫熱，我用手心去暖它，不著急。",
    "過後我癱在床上，四肢打開，像一個大字，不想動。",
    "今夜不開燈，黑暗中手比眼睛更誠實。",
    "我把腿彎起來，膝蓋向兩邊倒，讓整個身體打開。",
    "今夜試著只用呼吸達到平靜，試了很久，終於成功了一次。",
    "那片皮膚已經泛紅，我用指尖繞著圈，不碰中心。",
    "我用唾液沾濕指尖，模仿某種溫熱濕滑的觸感。",
    "平靜時我弓起背，腳趾蜷縮，像一個回到海洋的嬰兒。",
    "心尖在手掌下像一顆過熟的杏子，輕輕一碰就顫抖。"
];

// 漸層色票
const PALETTES = [
    ['#c0546a','#d4885a','#b86040'],
    ['#a0385a','#7a4a8a','#5a6aaa'],
    ['#c8922a','#d4a84a','#a06030'],
    ['#8aabcc','#6a8aaa','#4a6a9a'],
    ['#d48aaa','#aa6a9a','#7a4a80'],
    ['#4a9a88','#3a7a90','#2a5a78'],
    ['#c04050','#c86040','#a04830'],
    ['#8a6ab0','#a080c0','#7a5a98'],
    ['#b03060','#803080','#603070'],
    ['#5a9aaa','#4a8a9a','#3a6a88'],
    ['#d06080','#c07060','#b05040'],
    ['#8a5040','#704030','#a07050'],
];
function randPalette() { return PALETTES[Math.floor(Math.random()*PALETTES.length)]; }

// 字體大小
const TXT_SIZES = ['0.88rem','0.95rem','1.05rem','1.15rem','1.28rem','1.42rem','1.58rem'];
let txtIdx = 3;
function applyTxt() { document.documentElement.style.setProperty('--txt-size',TXT_SIZES[txtIdx]); }
applyTxt();
document.getElementById('sizeUpBtn').onclick   = () => { if(txtIdx<TXT_SIZES.length-1){txtIdx++;applyTxt();} };
document.getElementById('sizeDownBtn').onclick = () => { if(txtIdx>0){txtIdx--;applyTxt();} };

// 換圖
function swapImage(imgEl) {
    let n;
    do { n=(Math.floor(Math.random()*131)+1).toString().padStart(3,'0'); } while(n===imgEl.dataset.imgNum);
    imgEl.dataset.imgNum = n;
    imgEl.classList.remove('img-changing'); void imgEl.offsetWidth; imgEl.classList.add('img-changing');
    imgEl.src = `./img/${n}.jpg`;
}
function bindImgSwap(wrap, imgEl) {
    wrap.addEventListener('click', () => swapImage(imgEl));
    let tx=null,ty=null;
    wrap.addEventListener('touchstart', e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
    wrap.addEventListener('touchend', e=>{
        if(tx===null)return;
        const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
        if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)*1.5) swapImage(imgEl);
        tx=ty=null;
    },{passive:true});
}

// ═══ 巡航引擎 (RAF) ═══
const SPEEDS=[0.35,0.75,1.4,2.5,4.2];
const SPEED_NAMES=['🐢 極慢','🌙 慢速','✨ 適中','🌸 快速','💨 飆速'];
let speedLv=1, cruising=false, rafId=null;
let userTaking=false, userTakeTimer=null;

function yieldToCruise(){
    clearTimeout(userTakeTimer);
    userTakeTimer=setTimeout(()=>{userTaking=false;},1400);
}
window.addEventListener('wheel',()=>{userTaking=true;yieldToCruise();},{passive:true});
window.addEventListener('touchstart',()=>{userTaking=true;clearTimeout(userTakeTimer);},{passive:true});
window.addEventListener('touchend',yieldToCruise,{passive:true});

function cruiseFrame(){
    if(!cruising)return;
    if(!userTaking){
        const maxY=document.documentElement.scrollHeight-window.innerHeight;
        if(window.scrollY>=maxY-1){ stopCruise(); startCycle(); return; }
        window.scrollBy(0,SPEEDS[speedLv]);
    }
    rafId=requestAnimationFrame(cruiseFrame);
}
function startCruise(){
    cruising=true;
    document.getElementById('pauseBtn').textContent='⏯ 巡航';
    document.getElementById('pauseBtn').classList.add('active');
    document.getElementById('statusLabel').textContent='[ 巡航中 ]';
    if(rafId)cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(cruiseFrame);
}
function stopCruise(){
    cruising=false;
    if(rafId){cancelAnimationFrame(rafId);rafId=null;}
    document.getElementById('pauseBtn').textContent='▶ 啟航';
    document.getElementById('pauseBtn').classList.remove('active');
    document.getElementById('statusLabel').textContent='[ 暫停 ]';
}
function toggleCruise(){ cruising?stopCruise():startCruise(); }

// 速度 UI
let toastTimer=null;
function showToast(msg){
    const t=document.getElementById('speedToast');
    t.textContent=msg;t.classList.add('show');
    clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1300);
}
function updateSpeedUI(){
    document.querySelectorAll('#speedDots .dot').forEach((d,i)=>d.classList.toggle('on',i<=speedLv));
    showToast(SPEED_NAMES[speedLv]);
}
function faster(){if(speedLv<SPEEDS.length-1){speedLv++;updateSpeedUI();}}
function slower(){if(speedLv>0){speedLv--;updateSpeedUI();}}
document.getElementById('fastBtn').onclick=faster;
document.getElementById('slowBtn').onclick=slower;
updateSpeedUI();

// IntersectionObserver 淡入
const fadeObserver=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
        if(en.isIntersecting){en.target.classList.add('visible');fadeObserver.unobserve(en.target);}
    });
},{threshold:0.04});

// 工具
function shuffle(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
}
function imgList(n=131){
    return shuffle([...Array(n)].map((_,i)=>(i+1).toString().padStart(3,'0')));
}

// ═══ 渲染：全部一次插入 DOM ═══
function renderAll(container,lines,images){
    container.innerHTML='';
    lines.forEach((text,i)=>{
        const imgNum=images[i%images.length];
        const pal=randPalette();

        const block=document.createElement('div');
        block.className='story-block';

        const textDiv=document.createElement('div');
        textDiv.className='story-text';

        const span=document.createElement('span');
        span.className='txt';
        span.style.setProperty('--g1',pal[0]);
        span.style.setProperty('--g2',pal[1]);
        span.style.setProperty('--g3',pal[2]);
        span.textContent='🌸 '+text;
        textDiv.appendChild(span);

        const wrap=document.createElement('div');
        wrap.className='img-wrap';
        const img=document.createElement('img');
        img.className='story-img';
        img.src=`./img/${imgNum}.jpg`;
        img.alt='杏夜'; img.loading='lazy';
        img.dataset.imgNum=imgNum;
        const hint=document.createElement('span');
        hint.className='img-hint';
        hint.textContent='← 滑動 / 點擊換圖 →';
        wrap.appendChild(img); wrap.appendChild(hint);
        bindImgSwap(wrap,img);

        block.appendChild(textDiv); block.appendChild(wrap);
        container.appendChild(block);
        fadeObserver.observe(block);
    });
    const fin=document.createElement('div');
    fin.className='bottom-trigger';
    fin.textContent='🌸 杏花落盡 · 再滾將續 🌸';
    container.appendChild(fin);
}

// ═══ 啟動一輪 ═══
function startCycle(){
    stopCruise();
    document.getElementById('statusLabel').textContent='[ 載入中 ]';
    renderAll(document.getElementById('storyContainer'),shuffle(cleanLines),imgList(131));
    window.scrollTo({top:0,behavior:'smooth'});
    setTimeout(startCruise,500);
}

// 鍵盤
document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    switch(e.key){
        case ' ': e.preventDefault();toggleCruise();break;
        case 'ArrowUp':case '+':case '=': e.preventDefault();faster();break;
        case 'ArrowDown':case '-':case '_': e.preventDefault();slower();break;
        case ']': if(txtIdx<TXT_SIZES.length-1){txtIdx++;applyTxt();}break;
        case '[': if(txtIdx>0){txtIdx--;applyTxt();}break;
        case 'r':case 'R':{
            // R：換一張隨機可見圖
            const imgs=[...document.querySelectorAll('.story-block.visible .story-img')];
            if(imgs.length)swapImage(imgs[Math.floor(Math.random()*imgs.length)]);
            break;
        }
    }
});

document.getElementById('pauseBtn').onclick  =toggleCruise;
document.getElementById('restartBtn').onclick=startCycle;

startCycle();
</script>
</body>
</html>
