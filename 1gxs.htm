<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>悠風 · 極彩墮花 V6.2 | 61節點 & 深度去重版</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0A0005; color: #ddd;
        font-family: 'Georgia', 'Microsoft JhengHei', serif;
        overflow: hidden; width: 100vw; height: 100vh;
    }

    /* 頂欄 - 隱藏式設計 */
    .header {
        position: fixed; top: 0; left: 0; width: 100%; height: 32px;
        background: rgba(10, 0, 5, 0.85); border-bottom: 1px solid #4a0a6f;
        display: flex; justify-content: space-between; align-items: center;
        z-index: 1000; padding: 0 15px; opacity: 0.1; transition: opacity 0.3s;
    }
    .header:hover { opacity: 1; }
    .title { color: #e0aaff; font-size: 0.75rem; letter-spacing: 1px; }

    /* 觸控/iPad 控制區 */
    .touch-ctrl {
        position: fixed; bottom: 25px; right: 25px; z-index: 2000;
        display: flex; gap: 12px; opacity: 0.15; transition: 0.3s;
    }
    .touch-ctrl:hover { opacity: 0.9; }
    .t-btn {
        width: 44px; height: 44px; background: rgba(109, 18, 2, 0.8);
        border: 1px solid #9e0bab; color: white; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 1.1rem; box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    #storyContainer {
        width: 100vw; background: #1A0A15; position: absolute;
        top: 0; left: 0; padding: 45px 0; will-change: transform;
    }

    .story-line {
        padding: 12px 25px; font-weight: 500; border-left: 5px solid;
        line-height: 1.6; transition: font-size 0.2s ease; word-break: break-all;
        margin-bottom: 2px;
    }

    .story-line b {
        color: #ffb7b0; background: rgba(58, 10, 42, 0.9);
        padding: 0 5px; border-radius: 4px; text-shadow: 0 0 3px #9e0bab;
    }
</style>
</head>
<body>

<div class="header">
    <div class="title">🌙 悠風 · 極彩墮花 V6.2 (61 Nodes + Solo+)</div>
    <div id="scrollIndicator" style="font-size: 0.7rem; color: #9e0bab;">[ 巡航中 ]</div>
</div>

<div class="touch-ctrl">
    <div class="t-btn" onclick="changeFontSize(2)">A+</div>
    <div class="t-btn" onclick="changeFontSize(-2)">A-</div>
    <div class="t-btn" onclick="togglePlay()">⏯️</div>
    <div class="t-btn" onclick="resetAll()">⟳</div>
</div>

<div id="storyContainer"></div>

<script>
    const tokens = {
        env: ["春夜燥動的杏花香氣", "月華穿過疏枝篩落", "林間凝滯的濕潤霧氣", "寂靜如死的密林深處", "帶著花蕊甜腥的暖風", "幽蘭腐熟般的甜靡氣味", "露水浸透的苔蘚氣息", "暗影浮動的月下小徑"],
        feeling: ["羞恥與渴望如藤蔓絞纏", "理智在暗火中寸寸成灰", "一種近乎受刑的豐盈飽脹", "瀕臨滅頂的恍惚極樂", "道德與本能交戰後的虛脫", "如墜深淵卻又甘願沉溺", "被窺視的戰慄快感"],
        action: ["難耐地蜷曲扭動", "顫抖著探入衣襟深處", "蠻橫而不講理地楔入", "如狂浪般上下吞吐", "放肆地揉捏搓弄", "痙攣般地絞緊又放鬆", "無意識地迎合撞擊"],
        solo: [
            "今夜又無睡意，我躺在那張寬大的床上，指尖從鎖骨緩緩下滑。{env}。",
            "我閉上眼，讓自己回到那片杏花林裡，{feeling}。",
            "掌心貼住小腹，那裡的燥熱像一團遲遲不熄的暗火。{action}。",
            "我試著想像一雙手，不是任何人的，只是最懂我力道的手。{env}。",
            "乳尖在薄衫下悄悄硬了，我隔著布料輕輕捻動，{feeling}。",
            "我分開腿，讓夜風從窗縫溜進來，拂過那片最隱密的濕意。{action}。",
            "沒有羞恥，也沒有觀眾。今夜我只是我自己的祭品。{env}。",
            "中指沿著肉縫來回游移，卻遲遲不肯按下去——我要把快感拉長。{feeling}。",
            "我咬住枕角，怕自己叫出聲。其實整間屋子只有我一人。{action}。",
            "那片花瓣已經充血腫脹，我用兩指撐開，對著鏡子看。{env}。",
            "高潮前的懸崖最磨人，我停下所有動作，大口喘氣。{feeling}。",
            "我把枕頭墊在腰下，讓那處微微上翹，方便手指深入。{action}。",
            "想像杏花瓣落在我赤裸的小腹上，冰涼與滾燙交錯。{env}。",
            "我從來不知道，自己可以把自己弄成這樣——{feeling}。",
            "兩根手指撐開甬道入口，空虛感像潮水一樣湧上來。{action}。",
            "我用唾液沾濕指尖，模仿某種溫熱濕滑的觸感。{env}。",
            "大腿內側的筋脈在跳動，我弓起腰，像一張拉滿的弓。{feeling}。",
            "乳房的脹痛需要被揉散，我雙手捧住它們，緩慢施力。{action}。",
            "我讓自己跪趴在床上，回頭從鏡子裡看見那副淫艷的身體。{env}。",
            "陰蒂在指腹下像一顆過熟的莓果，輕輕一碰就顫抖。{feeling}。",
            "我把腿張到最開，讓整個陰戶暴露在空氣與月光中。{action}。",
            "今夜不追求高潮，只享受那種漫長的、濕潤的煎熬。{env}。",
            "我學著用最輕的力道畫圈，一圈、兩圈……呼吸亂了。{feeling}。",
            "我用另一隻手掐住乳頭，微痛讓下面的手指更濕。{action}。",
            "想像有人在我耳邊低語，說些下流卻不粗鄙的話。{env}。",
            "小腹深處有一團火，我用指尖去夠，卻總是差一點點。{feeling}。",
            "我翻身趴著，把陰戶壓在枕角上，輕輕磨蹭。{action}。",
            "杏花的氣味是假的，是我自己噴在枕頭上的香水。{env}。",
            "高潮過後我蜷縮著，像一隻被雨淋濕的貓。{feeling}。",
            "我故意只撫摸大腿內側，不碰那處，讓慾望自己漲滿。{action}。",
            "今夜用了玩具，震動從那處傳到喉嚨，我發出不像自己的聲音。",
            "我讓自己緩慢地高潮，像潮水一寸一寸漲起來，再慢慢退去。",
            "自慰不是為了填補誰，而是確認這具身體還活著、還會渴。",
            "我學會了在快感最強烈的時候抽手，讓它在體內自己炸開。",
            "鏡子裡的女人滿臉潮紅，乳尖挺立，腿間亮晶晶的——那是我。",
            "我用冰塊代替手指，冷與熱在體內打架，我尖叫著投降。",
            "今夜夢見一片無人的沙灘，浪花一次次衝過我的腿間。",
            "我不再急著高潮，而是讓手慢慢旅行：鎖骨、乳尖、肚臍、恥骨。",
            "高潮後的幾分鐘最安靜，我聽著自己的心跳，像雨後屋簷滴水。",
            "我用羽毛輕輕掃過乳頭和陰蒂，那種癢讓人想哭。",
            "有時候只是把手放在那處，不加任何動作，光是體溫就夠了。",
            "我學會了用呼吸控制高潮：吸氣時繃緊，吐氣時釋放。",
            "今夜不開燈，黑暗中手指比眼睛更誠實。",
            "我把枕頭夾在腿間，輕輕搖動腰肢，像騎在一朵雲上。",
            "自慰是寫給身體的情書，每一筆都是自己才懂的暗語。",
            "高潮時我會無意識地喊出一個名字，但那名字連我自己都聽不清。",
            "我讓自己保持在高潮邊緣半小時，像走在懸崖邊的鋼索上。",
            "用溫熱的潤滑油塗滿整個陰戶，滑膩的感覺像另一層皮膚。",
            "我把手指伸進嘴裡沾濕，模仿別人的體液。",
            "高潮過後我癱在床上，腿還開著，不想合攏。",
            "今夜試著只用乳頭達到高潮，揉了很久，終於成功了一次。",
            "我把自己綁在床上，動彈不得，反而讓快感更集中。",
            "自慰是我和自己的秘密約會，不需要打扮，不需要說話。",
            "我把震動玩具調到最弱，貼在陰蒂上一整夜，睡睡醒醒。",
            "高潮時我咬住手背，眼淚流了下來，不是難過，是太滿了。",
            "我學會了在自慰後好好清洗自己，像一場溫柔的告別。",
            "有時候只是撫摸自己的頭髮和臉頰，也能感到一種奇異的安心。",
            "今夜沒有高潮，只有漫長的、濕潤的、不求解脫的撫摸。",
            "我用兩面鏡子，看見自己那處的顏色和形狀——像一朵暗紅的花。",
            "自慰讓記住：這副身體首先是自己的，然後才是別人的。",
            "高潮時我弓起背，腳趾蜷縮，像一個回到海洋的嬰兒。",
            "我讓手指在體內慢慢旋轉，尋找那個最敏感的小點。",
            "用指尖輕彈陰蒂，那種刺痛像雨點打在火燙的地面上。",
            "我對著語音備忘錄自慰，錄下自己的聲音，第二天又刪掉。",
            "把潤滑油塗滿整個身體，滑溜溜的，像一條剛出生的魚。",
            "高潮後我躺在床上發呆，月光照著腿間那灘亮晶晶的水漬。",
            "我用震動玩具的尾端輕輕敲打陰蒂，麻癢從那處竄到頭頂。",
            "今夜想像自己是一隻母獸，在月光下自己舔舐自己。",
            "自慰結束後，我拉好被子，翻身，一夜無夢。"
        ]
    };

    const colorPalette = ["#9e0bab", "#862d12", "#503a0f", "#004379", "#450b64", "#3d099f", "#012e5e", "#6d1202", "#4a0a6f", "#098994", "#2d6316", "#0c5426"];

    let fontSize = 22;
    let scrollPos = 30;
    let scrollSpeed = 0.8;
    let isRunning = true;

    // 工具：Fisher-Yates 洗牌演算法
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderStory() {
        const container = document.getElementById('storyContainer');
        let html = '';
        
        // 1. 先洗牌 solo 庫，確保每句在單次循環中只出現一次
        let shuffledSolo = shuffle([...tokens.solo]);
        
        // 2. 生成 61 個節點
        for (let i = 0; i <= 60; i++) {
            let raw = shuffledSolo[i % shuffledSolo.length]; // 循環使用洗牌後的句子
            
            // 替換佔位符
            let cooked = raw.replace(/{(\w+)}/g, (m, k) => tokens[k] ? tokens[k][Math.floor(Math.random()*tokens[k].length)] : m);
            
            // 關鍵字高亮
            cooked = cooked.replace(/(乳房|豪乳|雙乳|雪乳|奶水|乳汁|乳尖|乳頭|陽物|肉杵|肉柱|花心|花瓣|蕊珠|陰精|淫水|愛液|白濁|自慰|自瀆|陰戶|陰蒂|甬道)/g, '<b>$1</b>');
            
            const color = colorPalette[i % colorPalette.length];
            html += `<div class="story-line" style="color: ${color}; border-left-color: ${color}; font-size: ${fontSize}px;">🌸 ${cooked}</div>`;
        }
        container.innerHTML = html;
    }

    function animate() {
        if (isRunning) {
            const container = document.getElementById('storyContainer');
            scrollPos -= scrollSpeed;
            if (Math.abs(scrollPos) > container.offsetHeight - window.innerHeight) {
                scrollPos = 30;
                renderStory(); // 到底重整
            }
            container.style.transform = `translateY(${scrollPos}px)`;
        }
        requestAnimationFrame(animate);
    }

    // iPad / 觸控控制
    function changeFontSize(delta) {
        fontSize += delta;
        document.querySelectorAll('.story-line').forEach(l => l.style.fontSize = fontSize + 'px');
    }

    function togglePlay() {
        isRunning = !isRunning;
        document.getElementById('scrollIndicator').innerText = isRunning ? "[ 巡航中 ]" : "[ 已暫停 ]";
    }

    function resetAll() {
        scrollSpeed = 0.8;
        scrollPos = 30;
        renderStory();
        window.scrollTo(0,0);
    }

    // 鍵盤支援
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.key === '+' || e.key === '=') changeFontSize(2);
        if (e.key === '-' || e.key === '_') changeFontSize(-2);
        if (e.key === 'Escape') resetAll();
        if (e.key === 'ArrowUp') scrollSpeed += 0.2;
        if (e.key === 'ArrowDown') scrollSpeed = Math.max(0, scrollSpeed - 0.2);
    });

    window.addEventListener('DOMContentLoaded', () => { renderStory(); animate(); });
</script>
</body>
