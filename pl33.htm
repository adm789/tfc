<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>Lite Player Pro - 3x3 可拖拽面板｜終極版</title>
    <style>
        * { 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
        }
        body { 
            background: #0a0a0f; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif; 
        }
        
        /* 主視窗：橫向滑動翻頁 (保留 scroll-snap) */
        .Window { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            overflow-x: auto; 
            overflow-y: hidden; 
            scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; 
            scrollbar-width: thin;
            scrollbar-color: #0cf #222;
        }
        
        /* 每一頁都是 3x3 網格 (可拖拽排序的容器) */
        .Page { 
            flex: 0 0 100%; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, 1fr);
            scroll-snap-align: start; 
            height: 100%;
            gap: 2px;
            background: #111;
            padding: 2px;
        }
        
        /* 卡片樣式：支援拖拽、優雅過渡 */
        .Card { 
            background: #000; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            overflow: hidden; 
            transition: box-shadow 0.2s, transform 0.1s ease;
            cursor: grab;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .Card:active {
            cursor: grabbing;
        }
        .Card.dragging {
            opacity: 0.6;
            cursor: grabbing;
            transform: scale(0.98);
            z-index: 1000;
        }
        .Card.drag-over {
            border: 2px solid #0cf;
            box-shadow: 0 0 0 2px rgba(0,255,255,0.5);
            transition: 0.05s linear;
        }
        
        /* 視覺容器: 縮放動畫 */
        .Visual { 
            position: relative; 
            flex: 1; 
            overflow: hidden; 
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1); 
            transform-origin: center center; 
            min-height: 0;
            background: #050505;
        }
        
        video, img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            pointer-events: none;  /* 避免干擾拖拽 */
        }
        
        /* 標籤列：顯示編號＋檔名 */
        .Label { 
            padding: 6px 8px; 
            font-size: 11px; 
            font-weight: 500;
            color: #0cf; 
            background: rgba(10,10,20,0.85);
            backdrop-filter: blur(8px);
            text-align: center; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
            transition: opacity 0.3s ease, padding 0.2s;
            border-top: 1px solid #2a7faa33;
            font-family: monospace;
            letter-spacing: 0.5px;
        }
        
        /* UI 自動隱藏 (標籤＋控制列) */
        body.hideUI .Label { 
            opacity: 0; 
            visibility: hidden; 
            height: 0;
            padding: 0;
            border: none;
        }
        body.hideUI #Controls, 
        body.hideUI #InfoDisplay { 
            opacity: 0; 
            visibility: hidden; 
            transition: opacity 0.4s, visibility 0.4s; 
        }
        
        /* 浮動控制台 - 美觀實用 */
        #Controls { 
            position: fixed; 
            bottom: 24px; 
            right: 24px; 
            z-index: 99; 
            background: rgba(12, 12, 24, 0.9);
            backdrop-filter: blur(16px);
            padding: 10px 14px; 
            border-radius: 48px; 
            border: 1px solid rgba(0, 255, 255, 0.5); 
            display: flex; 
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }
        
        .btn-group {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 4px 8px;
            border-radius: 40px;
        }
        
        .btn { 
            width: 42px; 
            height: 42px; 
            background: #1e1e2f; 
            color: #0ff; 
            border: 1px solid #2a7faa; 
            border-radius: 30px; 
            display: inline-flex;
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            cursor: pointer; 
            transition: 0.2s;
            font-weight: 500;
        }
        .btn:active { transform: scale(0.92); background: #2a2a4a; }
        
        .option { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #0a0f1a; 
            border-radius: 36px; 
            border: 1px solid #2a7faa; 
            font-family: monospace; 
            min-width: 56px;
            padding: 4px 6px;
        }
        .val { font-size: 13px; font-weight: bold; letter-spacing: 1px; color: #ffaa66; }
        .step-btn { cursor: pointer; padding: 0 8px; font-size: 16px; color: #ffaa55; font-weight: bold; }
        
        #InfoDisplay { 
            position: fixed; 
            top: 16px; 
            left: 16px; 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(8px);
            padding: 6px 16px; 
            border-radius: 32px; 
            color: #0cf; 
            border-left: 3px solid #0ff; 
            font-size: 12px; 
            z-index: 100; 
            font-family: monospace;
            pointer-events: none;
            white-space: nowrap;
        }
        
        .loading { 
            position: fixed; 
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: #0ff;
            background: #000000dd;
            backdrop-filter: blur(12px);
            padding: 20px 32px;
            border-radius: 40px;
            z-index: 200;
            font-size: 16px;
            text-align: center;
            border: 1px solid #0ff;
            box-shadow: 0 0 30px rgba(0,255,255,0.2);
        }
        
        .debug { 
            position: fixed; 
            bottom: 12px; 
            left: 12px; 
            font-size: 9px; 
            color: #aaa; 
            background: rgba(0,0,0,0.5);
            padding: 3px 12px;
            border-radius: 20px;
            font-family: monospace;
            pointer-events: none;
            z-index: 98;
        }
        
        @media (max-width:700px) {
            #Controls { transform: scale(0.85); right: 8px; bottom: 12px; padding: 6px 10px; gap: 5px; }
            .btn { width: 38px; height: 38px; font-size: 18px; }
            .Label { font-size: 8px; }
        }
        
        /* 自定義滾動條 */
        .Window::-webkit-scrollbar { height: 5px; background: #1a1a1a; }
        .Window::-webkit-scrollbar-thumb { background: #0cf; border-radius: 8px; }
    </style>
</head>
<body>

<div class="Window" id="MainViewer"></div>
<div id="InfoDisplay">🎬 Lite Player Pro · 3x3 可拖拽面板</div>
<div id="loadingMsg" class="loading">⏳ 初始化媒體庫...</div>
<div id="debugInfo" class="debug"></div>

<div id="Controls">
    <div class="btn-group">
        <div class="btn" id="prevPageBtn" title="上一頁 (步進)">◀◀</div>
        <div class="btn" id="playPauseBtn" title="播放/暫停">⏸</div>
        <div class="btn" id="nextPageBtn" title="下一頁">▶▶</div>
    </div>
    <div class="option">
        <div class="val" id="stepVal">1</div>
        <div style="display:flex"><span class="step-btn" id="stepMinus">-</span><span class="step-btn" id="stepPlus">+</span></div>
    </div>
    <div class="btn" id="resetZoomBtn" title="重設縮放">⟲</div>
    <div class="option">
        <div class="val" id="delayVal">3.0s</div>
        <div style="display:flex"><span class="step-btn" id="delayMinus">-</span><span class="step-btn" id="delayPlus">+</span></div>
    </div>
    <div class="btn" id="fullscreenBtn" title="全螢幕">⛶</div>
    <div class="btn" id="zoomBtn" title="縮放循環">🔍</div>
    <div class="btn" id="muteBtn" title="靜音切換">🔇</div>
</div>

<script>
    /**
     * ========================
     * Lite Player Pro - 3x3 可拖拽排序版
     * 功能: 
     *   1. 支援本地/遠程 list.js (自動解析相對路徑)
     *   2. 3x3 網格分頁，每頁9個媒體
     *   3. 卡片內可拖拽重新排序 (拖拽交換位置，自動保存順序)
     *   4. 懶加載 (IntersectionObserver) 節省頻寬
     *   5. 全螢幕、靜音、縮放、步進翻頁
     * ========================
     */
     
    // ---------- 全域變數 ----------
    let mediaMasterList = [];       // 原始媒體陣列 (全部分頁的串列)
    let currentPageIndex = 0;
    let totalPages = 0;
    let pageStep = 1;               // 翻頁步進
    let isPlaying = true;
    let isMuted = true;
    let zoomIndex = 0;
    const zoomLevels = [1, 1.5, 2, 2.5, 0.7];
    let autoDelay = 3.0;
    let listBaseDir = "";           // list.js 所在目錄
    
    // DOM 參考
    const viewer = document.getElementById('MainViewer');
    const infoDisplay = document.getElementById('InfoDisplay');
    const loadingDiv = document.getElementById('loadingMsg');
    const debugDiv = document.getElementById('debugInfo');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const zoomBtn = document.getElementById('zoomBtn');
    
    // 懶加載觀察器
    let lazyObserver = null;
    let uiTimer = null;
    
    // 拖拽相關變數
    let dragSourceCard = null;      // 被拖拽的卡片
    let dragTargetCard = null;      // 當前目標卡片
    
    // ---------- 輔助函數 ----------
    function debugLog(msg) {
        console.log("[ProPlayer]", msg);
        if (debugDiv) debugDiv.innerHTML = String(msg).slice(0, 120);
        setTimeout(() => {
            if (debugDiv && debugDiv.innerHTML === String(msg).slice(0,120)) 
                debugDiv.innerHTML = "✅ 就緒 | 拖拽卡片可排序";
        }, 3500);
    }
    
    // 路徑標準化
    function normalizePath(p) {
        if (!p) return p;
        return p.replace(/\\/g, '/').replace(/\/+/g, '/');
    }
    
    function getDirPath(fullPath) {
        let norm = normalizePath(fullPath);
        let lastSlash = norm.lastIndexOf('/');
        return lastSlash === -1 ? "" : norm.substring(0, lastSlash + 1);
    }
    
    function isAbsoluteOrRemote(p) {
        if (!p) return false;
        return /^[a-zA-Z]:[\/\\]/.test(p) || p.startsWith('http') || p.startsWith('file://') || p.startsWith('data:');
    }
    
    // 解析媒體絕對路徑 (本地file:// 或 遠程URL)
    function resolveMediaPath(relativePath, baseDir) {
        if (!relativePath) return "";
        let rel = normalizePath(relativePath);
        if (isAbsoluteOrRemote(rel)) {
            if (/^[a-zA-Z]:[\/\\]/.test(rel) && !rel.startsWith('file://') && !rel.startsWith('http')) 
                return 'file:///' + rel;
            return rel;
        }
        if (!baseDir) return rel;
        let base = baseDir.endsWith('/') ? baseDir : baseDir + '/';
        let combined = base + rel;
        let parts = combined.split('/');
        let stack = [];
        for (let part of parts) {
            if (part === '..') { if (stack.length) stack.pop(); }
            else if (part !== '.' && part !== '') stack.push(part);
        }
        let result = stack.join('/');
        if (/^[a-zA-Z]:[\/\\]/.test(result) && !result.startsWith('file://') && !result.startsWith('http'))
            result = 'file:///' + result;
        return result;
    }
    
    // ---------- 核心: 加載 list.js (script DOM 法, 完美支援 file:// 與 http) ----------
    function loadListScript(jsUrl) {
        return new Promise((resolve, reject) => {
            let finalUrl = normalizePath(jsUrl.trim());
            if (/^[a-zA-Z]:[\/\\]/.test(finalUrl) && !finalUrl.startsWith('file://'))
                finalUrl = 'file:///' + finalUrl;
            debugLog(`📡 載入清單: ${finalUrl}`);
            listBaseDir = getDirPath(finalUrl);
            
            const script = document.createElement('script');
            script.src = finalUrl;
            script.onload = () => {
                let mediaArr = null;
                if (window.mediaList && Array.isArray(window.mediaList)) mediaArr = window.mediaList;
                else if (typeof mediaList !== 'undefined' && Array.isArray(mediaList)) mediaArr = mediaList;
                if (window.mediaList) delete window.mediaList;
                if (mediaArr && mediaArr.length) resolve(mediaArr);
                else reject(new Error("list.js 未定義有效的 mediaList 陣列 (需為 const mediaList = [...])"));
            };
            script.onerror = () => reject(new Error(`無法載入 ${finalUrl}，請檢查路徑或使用 --allow-file-access-from-files`));
            document.head.appendChild(script);
        });
    }
    
    // 處理媒體清單: 轉絕對路徑, 加載標記, 名稱
    function buildMediaList(raw) {
        return raw.map((item, idx) => {
            let absSrc = resolveMediaPath(item.s, listBaseDir);
            let displayName = item.n || item.s.split('/').pop() || `媒體${idx+1}`;
            return {
                t: item.t,
                s: absSrc,
                n: displayName,
                loaded: false,
                originalIdx: idx
            };
        });
    }
    
    // ---------- 渲染全部頁面 (3x3 網格) ----------
    function renderAllPages() {
        viewer.innerHTML = '';
        if (!mediaMasterList.length) {
            infoDisplay.innerText = "⚠️ 無媒體內容";
            return;
        }
        const itemsPerPage = 9;   // 3x3
        totalPages = Math.ceil(mediaMasterList.length / itemsPerPage);
        
        for (let p = 0; p < totalPages; p++) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'Page';
            pageDiv.setAttribute('data-page', p);
            
            const startIdx = p * itemsPerPage;
            const endIdx = Math.min(startIdx + itemsPerPage, mediaMasterList.length);
            for (let i = startIdx; i < endIdx; i++) {
                const media = mediaMasterList[i];
                const card = createCardElement(media, i);
                pageDiv.appendChild(card);
            }
            // 如果該頁不足9格，補上空缺？保持格線整齊，但留空即可 (grid自動撐開)
            viewer.appendChild(pageDiv);
        }
        
        // 初始化拖拽事件 (每個卡片綁定)
        attachDragEvents();
        // 初始化懶加載觀察器
        initLazyObserverAndLoad();
        // 管理播放狀態
        manageMediaStates();
        updateStatusBar();
    }
    
    // 建立卡片 DOM (不含媒體 src, 留給懶加載)
    function createCardElement(media, globalIndex) {
        const card = document.createElement('div');
        card.className = 'Card';
        card.setAttribute('data-global-idx', globalIndex);
        card.setAttribute('draggable', 'true');
        card._mediaData = media;
        
        const visual = document.createElement('div');
        visual.className = 'Visual';
        const mediaElem = document.createElement(media.t === 'vid' ? 'video' : 'img');
        if (media.t === 'vid') {
            mediaElem.muted = isMuted;
            mediaElem.loop = true;
            mediaElem.playsInline = true;
            mediaElem.preload = 'metadata';
        }
        mediaElem.style.backgroundColor = '#0a0a0a';
        
        const label = document.createElement('div');
        label.className = 'Label';
        label.innerText = `#${globalIndex+1} ${media.n}`;
        
        visual.appendChild(mediaElem);
        card.appendChild(visual);
        card.appendChild(label);
        return card;
    }
    
    // ---------- 拖拽排序邏輯 (交換 mediaMasterList 元素) ----------
    function attachDragEvents() {
        const cards = document.querySelectorAll('.Card');
        cards.forEach(card => {
            card.removeEventListener('dragstart', dragStartHandler);
            card.removeEventListener('dragenter', dragEnterHandler);
            card.removeEventListener('dragover', dragOverHandler);
            card.removeEventListener('dragleave', dragLeaveHandler);
            card.removeEventListener('drop', dropHandler);
            card.removeEventListener('dragend', dragEndHandler);
            
            card.addEventListener('dragstart', dragStartHandler);
            card.addEventListener('dragenter', dragEnterHandler);
            card.addEventListener('dragover', dragOverHandler);
            card.addEventListener('dragleave', dragLeaveHandler);
            card.addEventListener('drop', dropHandler);
            card.addEventListener('dragend', dragEndHandler);
        });
    }
    
    let draggedItemIndex = null;
    function dragStartHandler(e) {
        const card = e.target.closest('.Card');
        if (!card) return;
        draggedItemIndex = parseInt(card.getAttribute('data-global-idx'));
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', draggedItemIndex);
    }
    function dragEnterHandler(e) {
        e.preventDefault();
        const targetCard = e.target.closest('.Card');
        if (targetCard && targetCard !== document.querySelector('.Card.dragging')) {
            targetCard.classList.add('drag-over');
        }
    }
    function dragOverHandler(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
    }
    function dragLeaveHandler(e) {
        const targetCard = e.target.closest('.Card');
        if (targetCard) targetCard.classList.remove('drag-over');
    }
    function dropHandler(e) {
        e.preventDefault();
        const targetCard = e.target.closest('.Card');
        if (!targetCard) return;
        const targetIndex = parseInt(targetCard.getAttribute('data-global-idx'));
        if (draggedItemIndex !== null && draggedItemIndex !== targetIndex && !isNaN(targetIndex)) {
            // 交換 mediaMasterList 中的兩個元素
            const [movedItem] = mediaMasterList.splice(draggedItemIndex, 1);
            mediaMasterList.splice(targetIndex, 0, movedItem);
            // 重新渲染全部頁面 (維持順序)
            renderAllPages();
            debugLog(`🔄 已移動卡片 #${draggedItemIndex+1} → #${targetIndex+1}`);
        }
        targetCard.classList.remove('drag-over');
        draggedItemIndex = null;
    }
    function dragEndHandler(e) {
        document.querySelectorAll('.Card').forEach(c => {
            c.classList.remove('dragging', 'drag-over');
        });
        draggedItemIndex = null;
    }
    
    // ---------- 懶加載: IntersectionObserver 動態載入媒體 ----------
    function lazyLoadElement(el, media) {
        if (!el || media.loaded) return;
        if (media.t === 'vid' && el.tagName === 'VIDEO') {
            el.src = media.s;
            el.muted = isMuted;
            if (isPlaying) el.play().catch(() => {});
        } else if (media.t === 'img' && el.tagName === 'IMG') {
            el.src = media.s;
        }
        media.loaded = true;
        debugLog(`📀 加載: ${media.n}`);
        updateStatusBar();
    }
    
    function initLazyObserverAndLoad() {
        if (lazyObserver) lazyObserver.disconnect();
        lazyObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target.closest('.Card');
                    if (card && card._mediaData && !card._mediaData.loaded) {
                        const mediaEl = card.querySelector('.Visual video, .Visual img');
                        if (mediaEl) lazyLoadElement(mediaEl, card._mediaData);
                    }
                }
            });
        }, { rootMargin: "300px 0px 300px 0px", threshold: 0.05 });
        
        document.querySelectorAll('.Card').forEach(card => lazyObserver.observe(card));
        // 立即觸發可見區域
        setTimeout(() => triggerVisibleLoad(), 100);
    }
    
    function triggerVisibleLoad() {
        document.querySelectorAll('.Card').forEach(card => {
            const rect = card.getBoundingClientRect();
            if (rect.right > 0 && rect.left < window.innerWidth && rect.bottom > 0 && rect.top < window.innerHeight) {
                if (card._mediaData && !card._mediaData.loaded) {
                    const mediaEl = card.querySelector('.Visual video, .Visual img');
                    if (mediaEl) lazyLoadElement(mediaEl, card._mediaData);
                }
            }
        });
    }
    
    // 播放/靜音控制
    function manageMediaStates() {
        document.querySelectorAll('video').forEach(v => {
            const rect = v.getBoundingClientRect();
            const visible = rect.right > 0 && rect.left < window.innerWidth;
            if (visible && v.src && isPlaying) v.play().catch(e=>{});
            else if (!isPlaying && v.src) v.pause();
            if (v.src) v.muted = isMuted;
        });
        updateStatusBar();
    }
    
    function updateStatusBar() {
        let loadedCnt = mediaMasterList.filter(m => m.loaded).length;
        infoDisplay.innerText = `📺 頁 ${currentPageIndex+1}/${totalPages} | 媒體 ${mediaMasterList.length} | 已載入 ${loadedCnt} | ${isPlaying ? '▶播放' : '⏸暫停'} | 💡 拖拽卡片可排序`;
    }
    
    // 翻頁 (步進)
    function changePage(delta) {
        if (totalPages === 0) return;
        let newIdx = currentPageIndex + (delta * pageStep);
        newIdx = Math.min(Math.max(0, newIdx), totalPages - 1);
        if (newIdx !== currentPageIndex) {
            currentPageIndex = newIdx;
            viewer.scrollTo({ left: currentPageIndex * viewer.clientWidth, behavior: 'smooth' });
            setTimeout(() => { triggerVisibleLoad(); manageMediaStates(); }, 200);
        }
    }
    
    // 其他UI函數
    function togglePlay() { isPlaying = !isPlaying; playPauseBtn.innerText = isPlaying ? '⏸' : '▶'; manageMediaStates(); }
    function toggleMute() { isMuted = !isMuted; muteBtn.innerText = isMuted ? '🔇' : '🔊'; manageMediaStates(); }
    function cycleZoom() { zoomIndex = (zoomIndex+1)%zoomLevels.length; const s=zoomLevels[zoomIndex]; document.querySelectorAll('.Visual').forEach(v=>v.style.transform=`scale(${s})`); zoomBtn.innerText = s===1?'🔍':`🔍${s}x`; }
    function resetZoom() { zoomIndex=0; document.querySelectorAll('.Visual').forEach(v=>v.style.transform='scale(1)'); zoomBtn.innerText='🔍'; }
    function updateStep(n) { pageStep = Math.max(1, pageStep+n); document.getElementById('stepVal').innerText = pageStep; }
    function updateDelay(n) { autoDelay = Math.max(0.5, autoDelay+n); document.getElementById('delayVal').innerText = autoDelay.toFixed(1)+'s'; }
    function toggleFullscreen() { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); }
    
    // 滾動監聽
    viewer.addEventListener('scroll', () => {
        if(viewer.clientWidth) {
            let newPage = Math.round(viewer.scrollLeft / viewer.clientWidth);
            if(newPage !== currentPageIndex && !isNaN(newPage)) { currentPageIndex = newPage; updateStatusBar(); triggerVisibleLoad(); manageMediaStates(); }
        }
    });
    
    // UI 自動隱藏
    function showUI() { document.body.classList.remove('hideUI'); clearTimeout(uiTimer); uiTimer = setTimeout(()=>document.body.classList.add('hideUI'), 4500); }
    ['mousemove','touchstart','click'].forEach(ev=>window.addEventListener(ev, showUI));
    showUI();
    
    // 按鈕綁定
    document.getElementById('prevPageBtn').onclick = () => changePage(-1);
    document.getElementById('nextPageBtn').onclick = () => changePage(1);
    document.getElementById('playPauseBtn').onclick = togglePlay;
    document.getElementById('muteBtn').onclick = toggleMute;
    document.getElementById('zoomBtn').onclick = cycleZoom;
    document.getElementById('resetZoomBtn').onclick = resetZoom;
    document.getElementById('fullscreenBtn').onclick = toggleFullscreen;
    document.getElementById('stepMinus').onclick = () => updateStep(-1);
    document.getElementById('stepPlus').onclick = () => updateStep(1);
    document.getElementById('delayMinus').onclick = () => updateDelay(-0.5);
    document.getElementById('delayPlus').onclick = () => updateDelay(0.5);
    
    // ---------- 啟動主程式 ----------
    async function init() {
        const params = new URLSearchParams(location.search);
        let listParam = params.get('list') || 'list.js';
        const dirFilter = params.get('dir');
        try {
            loadingDiv.style.display = 'flex';
            loadingDiv.innerHTML = `⏳ 讀取清單: ${listParam}<br>🔧 採用 script 注入模式 (支援本地/遠程)`;
            const rawList = await loadListScript(listParam);
            let processed = buildMediaList(rawList);
            if (dirFilter) processed = processed.filter(m => m.s.includes(dirFilter) || m.n.includes(dirFilter));
            if (!processed.length) throw new Error('無符合媒體');
            mediaMasterList = processed;
            renderAllPages();
            loadingDiv.style.display = 'none';
            debugLog(`初始化完成，共 ${mediaMasterList.length} 個媒體，3x3 可拖拽排序`);
        } catch(err) {
            loadingDiv.innerHTML = `❌ 錯誤: ${err.message}<br><br>📌 用法範例:<br>?list=https://xxx/list.js<br>?list=file:///X:/folder/list.js<br>list.js 須定義 const mediaList = [...]`;
            loadingDiv.style.color = '#f88';
            debugLog(`致命錯誤: ${err.message}`);
        }
    }
    init();
</script>
</body>
</html>
