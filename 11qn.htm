<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>杏夜絮語·網路相容版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#111;color:#eee;min-height:100vh}
#top{position:sticky;top:0;background:#1a1a2e;padding:8px 12px;display:flex;gap:8px;align-items:center;z-index:100}
#top button{background:#333;color:#eee;border:1px solid #555;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:14px}
#main{padding:12px;max-width:900px;margin:0 auto}
#txt{min-height:60px;padding:12px;background:#1a1a2e;border-radius:6px;margin-bottom:12px;line-height:1.6;font-size:16px}
#imgBox{position:relative;text-align:center;background:#000;border-radius:6px;overflow:hidden;min-height:300px;display:flex;align-items:center;justify-content:center}
#imgBox img{max-width:100%;max-height:70vh;display:block}
#hvTip{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:6px 14px;border-radius:5px;font-size:12px;z-index:9999;white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#hvTip.show{opacity:1}
#help{position:fixed;top:60px;right:12px;background:#1a1a2e;padding:10px;border-radius:6px;font-size:13px;display:none;z-index:99}#help.show{display:block}
</style></head><body>
<div id="top">🌙 杏夜絮語·網路相容版 <span id="stat">[偵測中]</span>
<button id="btnReload">⟳重讀</button><button id="btnPlay">▶巡航</button><button id="btnHelp">?</button></div>
<div id="help">Space暫停/巡航 ↑加速 ↓減速 ]放大字體 [縮小字體 R換圖 ?/Esc開關說明</div>
<div id="main"><div id="txt"></div><div id="imgBox"><img id="pic" alt="載入中..."></div></div>
<div id="hvTip"></div>

<!-- 載入外部 JS，失敗時觸發備援 -->
<script src="1nlines.js" onerror="initFallback()"></script>
<script>
// 🛡️ 離線/網路失敗備援機制
function initFallback(){
  if(!window.LinesLib){
    window.LinesLib={
      getAll:()=>[
        {text:"月光落在鎖骨上，涼涼的，像一片薄霜。",folder:""},
        {text:"指尖輕輕劃過小腹，感受夜的溫柔與寧靜。",folder:""},
        {text:"燭光映照的肌膚陰影，伴隨著細微的呼吸聲。",folder:""}
      ],
      imgSrc:(f,fn)=>f?`./img/${f}/${fn}`:`./img/${fn}`,
      getImage:f=>{var l=window.LinesLib.FOLDER_IMAGES[f]||[];return l.length?l[0]:'001.jpg'},
      FOLDER_IMAGES:{'':['001.jpg','002.jpg']},
      autoDetectFolder:()=>''
    };
    document.getElementById('stat').textContent='⚠️ 離線備援模式';
  }
}

// 🎮 核心邏輯
(function(){
  var txt=document.getElementById('txt'),pic=document.getElementById('pic'),stat=document.getElementById('stat'),tip=document.getElementById('hvTip'),timer;
  var lines=[],idx=0,playing=false,speed=2000;
  function $(id){return document.getElementById(id)}
  function rnd(arr){return arr[Math.floor(Math.random()*arr.length)]}
  function showTip(u){tip.textContent=u;tip.classList.add('show')}
  function hideTip(){tip.classList.remove('show')}
  
  // 🖱️ 懸停顯示網址
  document.addEventListener('mouseover',e=>{if(e.target.tagName==='IMG'){clearTimeout(timer);showTip(e.target.dataset.src||e.target.src)}});
  document.addEventListener('mouseout',e=>{if(e.target.tagName==='IMG')timer=setTimeout(hideTip,150)});

  function render(i){
    if(!lines.length)return;
    var item=lines[i%lines.length];
    txt.textContent=item.text;
    var f=item.folder||'', fn=LinesLib.getImage(f);
    var url=LinesLib.imgSrc(f,fn);
    pic.src=url; pic.dataset.src=url;
    pic.onload=()=>stat.textContent='✓ '+fn;
    pic.onerror=()=>{stat.textContent='✗圖檔載入失敗';pic.src='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect width="100%" height="100%" fill="#333"/><text x="50%" y="50%" fill="#fff" text-anchor="middle" dy=".3em">圖片路徑錯誤</text></svg>'};
  }

  function next(){idx=(idx+1)%lines.length;render(idx)}
  function load(){
    stat.textContent='[載入中]';
    if(LinesLib&&LinesLib.getAll){
      lines=LinesLib.getAll();
      stat.textContent='✓ 已載入 '+lines.length+' 句';
      idx=Math.floor(Math.random()*lines.length);
      render(idx);
    } else { setTimeout(load,100); }
  }

  function togglePlay(){
    playing=!playing;
    $('btnPlay').textContent=playing?'⏸暫停':'▶巡航';
    if(playing)loop();
  }
  function loop(){if(!playing)return;next();setTimeout(loop,speed)}

  document.addEventListener('keydown',e=>{
    if(e.key===' '){e.preventDefault();togglePlay()}
    else if(e.key==='ArrowUp'){speed=Math.max(500,speed-200)}
    else if(e.key==='ArrowDown'){speed=Math.min(8000,speed+200)}
    else if(e.key===']'){txt.style.fontSize=parseInt(txt.style.fontSize||16)+2+'px'}
    else if(e.key==='['){txt.style.fontSize=Math.max(12,parseInt(txt.style.fontSize||16)-2)+'px'}
    else if(e.key==='r'||e.key==='R'){
      var cur=lines[idx],f=cur.folder||'',list=LinesLib.FOLDER_IMAGES[f]||LinesLib.FOLDER_IMAGES[''];
      var fn=rnd(list),url=LinesLib.imgSrc(f,fn);
      pic.src=url;pic.dataset.src=url;
    }
    else if(e.key==='?'||e.key==='Escape')$('help').classList.toggle('show');
  });

  $('btnReload').onclick=function(){load();render(idx)};
  $('btnPlay').onclick=togglePlay;
  $('btnHelp').onclick=function(){$('help').classList.toggle('show')};
  window.addEventListener('load',load);
})();
</script></body></html>
