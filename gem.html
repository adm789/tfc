<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>杏夜絮語 · 精簡穩定版</title>
<script src="lines.js"></script>
<script src="img_list.js" onerror="window._noImgList=true"></script>
<style>
    /* 核心基礎樣式 - 保持輕量防止內存崩潰 */
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#1a0e0a;font-family:serif;line-height:1.88;color:#e8c4b0;}
    .header{position:fixed;top:0;width:100%;background:rgba(26,14,10,0.9);z-index:1000;padding:8px;border-bottom:1px solid #bc7a5e;display:flex;justify-content:space-between;font-size:0.8rem;}
    #storyContainer{padding-top:50px;max-width:800px;margin:0 auto;background:#fef7ef;min-height:100vh;}
    .story-block{padding:1em 20px;border-top:1px solid #ecd9c8;opacity:0;transition:opacity .5s;}
    .story-block.visible{opacity:1;}
    .story-text{font-size:1.18rem;font-weight:700;border-left:4px solid #bc7a5e;padding:10px;background:rgba(255,245,235,.7);color:#6b1a2a;margin-bottom:0;}
    .img-wrap{background:#2a1a14;min-height:150px;position:relative;}
    .story-img{width:100%;max-height:600px;object-fit:contain;display:block;}
    .status-label{color:#c0906a;padding:0 5px;}
    .ctrl-btn{background:#5e2e22;color:#fff;border:none;padding:4px 8px;cursor:pointer;border-radius:4px;}
</style>
</head>
<body>
<div class="header">
    <span>🌙 杏夜絮語</span>
    <span id="statusLabel">[ 偵測中 ]</span>
    <div>
        <button class="ctrl-btn" onclick="location.reload()">⟳ 重讀</button>
        <button class="ctrl-btn" id="pauseBtn" onclick="toggleCruise()">▶ 巡航</button>
    </div>
</div>
<div id="storyContainer"></div>

<script>
// ══════════════════════════════════════════════════════════════
// 1. 環境偵測與變數初始化
// ══════════════════════════════════════════════════════════════
var scanReady = false, imgPool = [], byFolder = {};
var loadingSet = new Set(), loadQueue = [], MAX_CONCURRENT = 3;

function setStatus(t){ document.getElementById('statusLabel').textContent = t; }

async function initEnv() {
    if (!window.LinesLib) return setStatus('❌ 缺 lines.js');
    
    // 檢查是否有 img_list.js 提供的本地清單
    if (window.IMG_LIST && IMG_LIST.length > 0) {
        setStatus('[ 測試路徑 ]');
        // 探針測試第一張圖
        var ok = await fetch(IMG_LIST[0], {method:'HEAD'}).then(r=>r.ok).catch(()=>false);
        if (ok) {
            scanReady = true;
            IMG_LIST.forEach(p => {
                p = p.replace(/\\/g, '/');
                var d = p.replace(/[^/]*$/, '') || 'img/';
                if(!byFolder[d]) byFolder[d] = [];
                byFolder[d].push(p);
                imgPool.push(p);
            });
            setStatus('[ ✓ 本地 ' + imgPool.length + ' ]');
        } else {
            setStatus('[ 🔗 網路模式 ]');
        }
    } else {
        setStatus('[ 🔗 網路模式 ]');
    }
    render();
}

// ══════════════════════════════════════════════════════════════
// 2. 圖片路徑選擇邏輯[cite: 1, 2]
// ══════════════════════════════════════════════════════════════
function getSrc(folder) {
    if (!scanReady) return LinesLib.imgSrc(folder, LinesLib.getImage(folder));
    var d = folder ? (folder.replace(/\/+$/,'')+'/') : 'img/';
    var p = byFolder[d] || imgPool;
    return p[Math.floor(Math.random()*p.length)];
}

// ══════════════════════════════════════════════════════════════
// 3. 圖片排隊加載系統 (防止網路模式卡死)
// ══════════════════════════════════════════════════════════════
function processQueue() {
    while (loadingSet.size < MAX_CONCURRENT && loadQueue.length > 0) {
        var img = loadQueue.shift();
        loadingSet.add(img);
        img.onload = img.onerror = function() {
            loadingSet.delete(this);
            processQueue();
        };
        img.src = img.dataset.src;
    }
}

// ══════════════════════════════════════════════════════════════
// 4. 懶加載與自動釋放 (針對 Chrome 109 記憶體優化)[cite: 2]
// ══════════════════════════════════════════════════════════════
var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(en) {
        var img = en.target.querySelector('img');
        if (en.isIntersecting) {
            en.target.classList.add('visible');
            if (scanReady) {
                img.src = img.dataset.src; // 本地直接加載[cite: 2]
            } else if (!img.src) {
                loadQueue.push(img); // 網路排隊加載[cite: 2]
                processQueue();
            }
        } else {
            // 滾出視窗自動清空，節省 RAM[cite: 2]
            if (!scanReady && img.src) { 
                img.removeAttribute('src'); 
                loadingSet.delete(img);
            }
        }
    });
}, { threshold: 0.1 });

// ══════════════════════════════════════════════════════════════
// 5. 渲染與巡航邏輯[cite: 1, 2]
// ══════════════════════════════════════════════════════════════
function render() {
    var cont = document.getElementById('storyContainer');
    var lines = LinesLib.getAll().sort(function(){return 0.5-Math.random()});
    
    lines.forEach(function(obj) {
        var src = getSrc(obj.folder || '');
        var div = document.createElement('div');
        div.className = 'story-block';
        div.innerHTML = '<p class="story-text">🌸 '+obj.text+'</p><div class="img-wrap"><img class="story-img" data-src="'+src+'" alt="loading..."></div>';
        cont.appendChild(div);
        observer.observe(div);
    });
}

var cruising = false;
function toggleCruise() {
    cruising = !cruising;
    document.getElementById('pauseBtn').textContent = cruising ? '⏯ 暫停' : '▶ 巡航';
    if (cruising) doCruise();
}

function doCruise() {
    if (!cruising) return;
    window.scrollBy(0, 1);
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight) {
        window.scrollTo(0, 0); // 循環滾動[cite: 2]
    }
    requestAnimationFrame(doCruise);
}

initEnv();
</script>
</body>
</html>
