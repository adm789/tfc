<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>杏夜絮語 · 完全雅化版 | 131圖文隨機輪迴</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: #1a0e0a;
    font-family: 'Georgia','Times New Roman','Microsoft JhengHei',serif;
    line-height: 1.88;
    overflow-x: hidden;
    color: #3a2a22;
}

/* ═══ 頂欄 ═══ */
.header {
    position: fixed; top:0; left:0; width:100%;
    background: rgba(26,14,10,0.95);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid #bc7a5e;
    display: flex; justify-content:space-between; align-items:center;
    z-index: 1000;
    padding: 7px 16px; gap:8px; flex-wrap:wrap;
}
.title { color:#e8c4b0; font-size:0.82rem; letter-spacing:2px; flex:1 1 auto; white-space:nowrap; }
.ctrl-group { display:flex; align-items:center; gap:5px; flex-shrink:0; }

.ctrl-btn {
    background:#5e2e22; border:none; color:#f0ddcf;
    padding:5px 11px; border-radius:40px; cursor:pointer;
    font-size:0.80rem; font-weight:bold; letter-spacing:1px;
    transition: background .18s, transform .1s;
    user-select:none; white-space:nowrap;
}
.ctrl-btn:hover  { background:#8e5a4a; color:#fff; }
.ctrl-btn:active { transform:scale(.93); }
.ctrl-btn.active { background:#8e4820; color:#ffe8d0; }

.speed-dots { display:flex; gap:3px; align-items:center; padding:0 2px; }
.dot { width:7px; height:7px; border-radius:50%; background:#5e2e22; transition:background .25s; }
.dot.on { background:#e8a060; }

.status-label { color:#c0906a; font-size:0.70rem; letter-spacing:1px; padding:0 2px; white-space:nowrap; min-width:56px; text-align:center; }

/* ═══ 主容器 ═══ */
#storyContainer {
    padding-top:58px;
    width:100%; max-width:800px; margin:0 auto;
    background:#fef7ef; 
    min-height:100vh;
    box-shadow:0 0 30px rgba(0,0,0,.22);
}

.story-block {
    padding: 20px 16px;                    /* 緊湊舒適 */
    border-bottom:1px solid #ecd9c8;
    display:flex; 
    flex-direction:column; 
    gap: 10px;                             /* 文字與圖片貼近 */
    opacity:0; 
    transform:translateY(18px);
    transition: opacity .65s ease, transform .65s ease;
}
.story-block.visible { opacity:1; transform:translateY(0); }

/* ==================== 彩色文字核心修復 ==================== */
.story-text {
    position: relative;
    font-size: var(--txt-size, 1.18rem);
    font-weight: 500;
    line-height: 1.88;
    padding: 14px 20px 14px 24px;
    border-left: 5px solid #bc7a5e;
    border-radius: 0 18px 18px 0;
    background: rgba(255,245,235,0.55);        /* 柔和統一底色 */
    overflow: hidden;
}

/* 底色偽元素（不干擾文字） */
.story-text::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,245,235,0.55);
    z-index: -1;
    border-radius: 0 18px 18px 0;
}

/* 漸層彩色文字 - 真正套在內層 span */
.story-text .txt {
    background: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
    width: 100%;
}

/* 漸層色票（柔和優雅） */
.story-text.color1 .txt { --g1:#c0546a; --g2:#d4885a; --g3:#b86040; }
.story-text.color2 .txt { --g1:#a0385a; --g2:#7a4a8a; --g3:#5a6aaa; }
.story-text.color3 .txt { --g1:#c8922a; --g2:#d4a84a; --g3:#a06030; }
.story-text.color4 .txt { --g1:#8aabcc; --g2:#6a8aaa; --g3:#4a6a9a; }
.story-text.color5 .txt { --g1:#d48aaa; --g2:#aa6a9a; --g3:#7a4a80; }
.story-text.color6 .txt { --g1:#4a9a88; --g2:#3a7a90; --g3:#2a5a78; }

.img-wrap {
    position:relative; 
    border-radius:18px; 
    overflow:hidden;
    cursor:pointer; 
    user-select:none;
}
.story-img {
    width:100%; 
    max-height:620px; 
    object-fit:contain;
    background:#2a1a14; 
    display:block; 
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.2); 
    border:1px solid #ecd9c8;
}
.img-hint {
    position:absolute; bottom:10px; right:14px;
    background:rgba(26,14,10,.68); 
    color:#e8c4b0;
    font-size:0.68rem; 
    letter-spacing:1px;
    padding:3px 10px; 
    border-radius:20px;
    pointer-events:none; 
    opacity:0; 
    transition:opacity .4s;
}
.img-wrap:hover .img-hint { opacity:1; }

@keyframes imgFlash { 0%{opacity:1} 40%{opacity:0} 100%{opacity:1} }
.img-changing { animation:imgFlash .38s ease; }

.bottom-trigger { 
    text-align:center; 
    padding:32px; 
    color:#b08a74; 
    font-size:.82rem; 
}

#speedToast {
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
    background:rgba(26,14,10,.88); color:#e8c4b0;
    padding:6px 20px; border-radius:40px; font-size:.76rem; letter-spacing:2px;
    pointer-events:none; opacity:0; transition:opacity .3s; z-index:999;
}
#speedToast.show { opacity:1; }
</style>
</head>
<body>

<div class="header">
    <div class="title">🌙 杏夜絮語 · 雅化版</div>
    <div class="ctrl-group">
        <button class="ctrl-btn" id="sizeUpBtn"   title="放大字體  ]">A+</button>
        <button class="ctrl-btn" id="sizeDownBtn" title="縮小字體  [">A−</button>
        <button class="ctrl-btn" id="slowBtn" title="減速  − ↓">−</button>
        <div class="speed-dots" id="speedDots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div>
        </div>
        <button class="ctrl-btn" id="fastBtn" title="加速  + ↑">+</button>
        <span class="status-label" id="statusLabel">[ 載入中 ]</span>
        <button class="ctrl-btn active" id="pauseBtn"   title="暫停/巡航  Space">⏯ 巡航</button>
        <button class="ctrl-btn"        id="restartBtn" title="重讀  ⟳">⟳</button>
    </div>
</div>

<div id="storyContainer"></div>
<div id="speedToast"></div>

<script>
// ==================== 加強詞庫（融入黃蓉性史風格靈感） ====================
const envPool = ["月光如水灑落","杏花林深處","深夜燭光搖曳的臥室","鏡前幽暗燈光","薄霧繚繞的窗邊","被窩溫熱餘溫","浴室水氣瀰漫","喜袍半解的燭影","雨夜窗前","月下浴池"];

const feelingPool = ["身體潮熱酥麻","心跳劇烈如鼓","全身輕顫不止","慾火在小腹緩緩燃燒","既甜蜜又疼痛的快感","柔軟無力卻渴望更多","隱秘的濕熱顫慄","靈魂被輕輕撕扯","強烈的空虛飢渴","被快感徹底淹沒"];

const actionPool = ["指尖緩慢用力游移揉捏","輕輕按壓最敏感處","腰肢如水蛇般扭動","雙腿緊緊交纏摩擦","掌心用力貼緊肌膚","舌尖輕舔乾燥唇瓣","緩慢深入探索","輕咬肩頭壓抑呻吟","在鏡中凝視自己羞紅的臉","豐滿胸脯用力摩擦"];

const bodyPool = ["豐盈顫抖的胸脯","圓潤緊致的臀瓣","大腿內側細膩濕熱肌膚","早已濕潤的花徑","挺立敏感的乳尖","柔軟滾燙的小腹","修長優美的頸項","泛紅發燙的耳垂","鎖骨下方薄薄皮膚","乳肉從指縫間溢出"];

const desirePool = ["想被粗暴占有與征服","渴望在疼痛中徹底融化","想被更深力道狠狠懲罰","期待被徹底填滿到極致","想讓自己完全敞開任由擺布","渴望感受到無法抗拒的狂野撞擊","想在高潮邊緣不斷徘徊","想把所有羞恥與快感獻出去","渴望被用力壓制疼愛","想讓這具身體永遠記住激烈溫柔"];

// 防重複替換
function replaceDynamic(text) {
    let result = text;
    const used = new Set();
    const replaceWith = (pool, threshold = 0.35) => {
        let word = pool[Math.floor(Math.random()*pool.length)];
        while(used.has(word) && Math.random() > threshold) word = pool[Math.floor(Math.random()*pool.length)];
        used.add(word);
        return word;
    };
    result = result.replace(/{env}/g, () => replaceWith(envPool, 0.4));
    result = result.replace(/{feeling}/g, () => replaceWith(feelingPool));
    result = result.replace(/{action}/g, () => replaceWith(actionPool, 0.3));
    result = result.replace(/{body}/g, () => replaceWith(bodyPool));
    result = result.replace(/{desire}/g, () => replaceWith(desirePool));
    return result;
}

const baseLines = [
    "在{env}，我閉上眼，讓{feeling}的自己慢慢沉浸，{action}過{body}，心底湧起強烈的{desire}。",
    "{env}下，我輕輕撫過{body}，{feeling}如潮水般襲來，{action}時忍不住低吟，那股{desire}讓我全身發燙。",
    "鏡子裡的我滿臉潮紅，在{env}中{action}著{body}，{feeling}交織成最隱秘的語言，我強烈渴望{desire}。",
    "我把枕頭墊在腰下，讓{body}微微上翹，{env}裡{feeling}地等待，{action}的同時心裡只想{desire}。",
    "{env}中，我用指尖用力{action}過{body}，{feeling}讓呼吸急促，那無法壓抑的{desire}在體內翻騰。",
    "想像杏花瓣落在{body}上，{env}裡冰涼與溫熱激烈交錯，{action}時我{feeling}到極致，只想被{desire}。",
    "薄衫下{body}的曲線在{env}中若隱若現，我{action}著它，{feeling}讓我停不下來，深深沉浸在{desire}之中。",
    "我讓自己跪趴在床上，從鏡子裡看見{body}誘人的弧度，{env}裡{action}時{feeling}如電流竄過，強烈想要{desire}。",
    "溫熱的油塗滿{body}，滑膩觸感讓我顫抖，{env}中我緩慢{action}自己，{feeling}讓我徹底敞開{desire}。",
    "{env}裡我咬住枕角壓抑聲音，{action}著滾燙的{body}，{feeling}如浪潮一波波襲來，深深沉醉在{desire}裡。",
    "豐滿的{body}在{env}中輕輕晃動，{action}時乳肉從指縫溢出，{feeling}讓我強烈渴望{desire}。",
    "在{env}燭光下，我故意將{body}貼得更緊，{action}帶來陣陣酥麻，{feeling}中充滿{desire}。"
];

const cleanLines = baseLines;

// ==================== 其他功能（不變） ====================
const TXT_SIZES = ['0.92rem','1.02rem','1.12rem','1.22rem','1.35rem','1.48rem','1.65rem'];
let txtIdx = 3;
function applyTxt() { document.documentElement.style.setProperty('--txt-size',TXT_SIZES[txtIdx]); }
applyTxt();

document.getElementById('sizeUpBtn').onclick = () => { if(txtIdx < TXT_SIZES.length-1){ txtIdx++; applyTxt(); } };
document.getElementById('sizeDownBtn').onclick = () => { if(txtIdx > 0){ txtIdx--; applyTxt(); } };

function swapImage(imgEl) {
    let n;
    do { n = (Math.floor(Math.random()*131)+1).toString().padStart(3,'0'); } 
    while(n === imgEl.dataset.imgNum);
    imgEl.dataset.imgNum = n;
    imgEl.classList.remove('img-changing'); 
    void imgEl.offsetWidth; 
    imgEl.classList.add('img-changing');
    imgEl.src = `./img/${n}.jpg`;
}

function bindImgSwap(wrap, imgEl) {
    wrap.addEventListener('click', () => swapImage(imgEl));
    let tx=null, ty=null;
    wrap.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
    wrap.addEventListener('touchend', e=>{
        if(tx===null) return;
        const dx = e.changedTouches[0].clientX - tx;
        const dy = e.changedTouches[0].clientY - ty;
        if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)*1.5) swapImage(imgEl);
        tx=ty=null;
    }, {passive:true});
}

// 巡航引擎（保持原樣）
const SPEEDS=[0.35,0.75,1.4,2.5,4.2];
const SPEED_NAMES=['🐢 極慢','🌙 慢速','✨ 適中','🌸 快速','💨 飆速'];
let speedLv=1, cruising=false, rafId=null;
let userTaking=false, userTakeTimer=null;

function yieldToCruise(){ clearTimeout(userTakeTimer); userTakeTimer=setTimeout(()=>{userTaking=false;},1400); }
window.addEventListener('wheel',()=>{userTaking=true;yieldToCruise();},{passive:true});
window.addEventListener('touchstart',()=>{userTaking=true;clearTimeout(userTakeTimer);},{passive:true});
window.addEventListener('touchend',yieldToCruise,{passive:true});

function cruiseFrame(){
    if(!cruising) return;
    if(!userTaking){
        const maxY = document.documentElement.scrollHeight - window.innerHeight;
        if(window.scrollY >= maxY-1){ stopCruise(); startCycle(); return; }
        window.scrollBy(0, SPEEDS[speedLv]);
    }
    rafId = requestAnimationFrame(cruiseFrame);
}
function startCruise(){
    cruising=true;
    document.getElementById('pauseBtn').textContent='⏯ 巡航';
    document.getElementById('pauseBtn').classList.add('active');
    document.getElementById('statusLabel').textContent='[ 巡航中 ]';
    if(rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(cruiseFrame);
}
function stopCruise(){
    cruising=false;
    if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
    document.getElementById('pauseBtn').textContent='▶ 啟航';
    document.getElementById('pauseBtn').classList.remove('active');
    document.getElementById('statusLabel').textContent='[ 暫停 ]';
}
function toggleCruise(){ cruising ? stopCruise() : startCruise(); }

let toastTimer=null;
function showToast(msg){
    const t = document.getElementById('speedToast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'),1300);
}
function updateSpeedUI(){
    document.querySelectorAll('#speedDots .dot').forEach((d,i)=> d.classList.toggle('on', i<=speedLv));
    showToast(SPEED_NAMES[speedLv]);
}
function faster(){ if(speedLv < SPEEDS.length-1){ speedLv++; updateSpeedUI(); } }
function slower(){ if(speedLv > 0){ speedLv--; updateSpeedUI(); } }
document.getElementById('fastBtn').onclick = faster;
document.getElementById('slowBtn').onclick = slower;
updateSpeedUI();

const fadeObserver = new IntersectionObserver(entries => {
    entries.forEach(en => {
        if(en.isIntersecting){ 
            en.target.classList.add('visible'); 
            fadeObserver.unobserve(en.target);
        }
    });
}, {threshold:0.05});

function shuffle(arr){
    const a = [...arr];
    for(let i=a.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
function imgList(n=131){
    return shuffle([...Array(n)].map((_,i) => (i+1).toString().padStart(3,'0')));
}

// 渲染函數 - 使用 <span class="txt"> 包住文字
function renderAll(container, lines, images){
    container.innerHTML = '';
    const shuffledLines = shuffle(lines);
    
    shuffledLines.forEach((baseText, i) => {
        const text = replaceDynamic(baseText);
        const imgNum = images[i % images.length];
        const colorClass = `color${Math.floor(Math.random()*6) + 1}`;

        const block = document.createElement('div');
        block.className = 'story-block';

        const textDiv = document.createElement('div');
        textDiv.className = `story-text ${colorClass}`;
        
        const span = document.createElement('span');
        span.className = 'txt';
        span.textContent = '🌸 ' + text;
        textDiv.appendChild(span);

        const wrap = document.createElement('div');
        wrap.className = 'img-wrap';
        const img = document.createElement('img');
        img.className = 'story-img';
        img.src = `./img/${imgNum}.jpg`;
        img.alt = '杏夜';
        img.loading = 'lazy';
        img.dataset.imgNum = imgNum;

        const hint = document.createElement('span');
        hint.className = 'img-hint';
        hint.textContent = '← 滑動 / 點擊換圖 →';

        wrap.appendChild(img);
        wrap.appendChild(hint);
        bindImgSwap(wrap, img);

        block.appendChild(textDiv);
        block.appendChild(wrap);
        container.appendChild(block);
        fadeObserver.observe(block);
    });

    const fin = document.createElement('div');
    fin.className = 'bottom-trigger';
    fin.textContent = '🌸 杏花落盡 · 再滾將續 🌸';
    container.appendChild(fin);
}

function startCycle(){
    stopCruise();
    document.getElementById('statusLabel').textContent = '[ 載入中 ]';
    renderAll(document.getElementById('storyContainer'), cleanLines, imgList(131));
    window.scrollTo({top:0, behavior:'smooth'});
    setTimeout(startCruise, 600);
}

document.addEventListener('keydown', e => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key){
        case ' ': e.preventDefault(); toggleCruise(); break;
        case 'ArrowUp': case '+': case '=': e.preventDefault(); faster(); break;
        case 'ArrowDown': case '-': case '_': e.preventDefault(); slower(); break;
        case ']': if(txtIdx < TXT_SIZES.length-1){ txtIdx++; applyTxt(); } break;
        case '[': if(txtIdx > 0){ txtIdx--; applyTxt(); } break;
        case 'r': case 'R':
            const imgs = [...document.querySelectorAll('.story-block.visible .story-img')];
            if(imgs.length) swapImage(imgs[Math.floor(Math.random()*imgs.length)]);
            break;
    }
});

document.getElementById('pauseBtn').onclick = toggleCruise;
document.getElementById('restartBtn').onclick = startCycle;

startCycle();
</script>
</body>
</html>
