    const colorPalette = [
        "#9e0bab",  // 深電紫
        "#862d12",  // 暗赤褐
        "#503a0f",  // 深橄欖棕
        "#004379",  // 深海軍藍
        "#450b64",  // 深酒紫
        "#3d099f",  // 靛紫重
        "#012e5e",  // 極深靛藍
        "#6d1202",  // 燒焦紅
        "#4a0a6f",  // 暗蘭花紫
        "#098994",  // 深青綠
        "#2d6316",  // 森林暗綠
        "#0c5426"   // 深松綠
    ];

    // 動態替換詞庫 {env} / {feeling} / {action}
    function replaceTokens(text) {
        return text.replace(/{(\w+)}/g, (match, key) => {
            const pool = tokens[key];
            if (!pool) return match;
            const randomItem = pool[Math.floor(Math.random() * pool.length)];
            return `<span class="hl">${randomItem}</span>`;
        });
    }

    // 隨機生成一篇完整長篇 (40句)
    function generateFullStory() {
        const storyLines = [];
        for (let i = 0; i <= 39; i++) {
            const key = 'N' + i;
            const options = lib[key];
            // 每節點隨機選一句
            const rawLine = options[Math.floor(Math.random() * options.length)];
            const cookedLine = replaceTokens(rawLine);
            storyLines.push(cookedLine);
        }
        return storyLines;
    }

    // 渲染至頁面，每行全粗 + 指定顏色循環
    function renderStory() {
        const storyLines = generateFullStory();
        const outDiv = document.getElementById('out');
        
        let html = '';
        for (let idx = 0; idx < storyLines.length; idx++) {
            const color = colorPalette[idx % colorPalette.length];
            html += `<div class="verse-line" style="color: ${color}; border-left-color: ${color};"><b>${storyLines[idx]}</b></div>`;
        }
        
        outDiv.innerHTML = html;
        outDiv.style.display = 'block';
        // 平滑滾動到頂部
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 綁定按鈕事件
    document.getElementById('weaveBtn').addEventListener('click', renderStory);
    
    // 頁面載入時自動生成一篇
    window.addEventListener('DOMContentLoaded', renderStory);
</script>
</body>
</html>
